    <script type="application/ld+json" data-faq-lang="it">{"@context":"https://schema.org","@type":"FAQPage","@id":"https://chronos-bot.com/it#faq-it","inLanguage":"it","url":"https://chronos-bot.com/it","dateModified":"2026-04-23","publisher":{"@type":"Organization","name":"Chronos","url":"https://chronos-bot.com","logo":{"@type":"ImageObject","url":"https://chronos-bot.com/favicon.png"}},"mainEntity":[{"@type":"Question","name":"Cos'è Chronos?","acceptedAnswer":{"@type":"Answer","text":"Chronos è un Auto-Pilot per Windows: scansiona in background le finestre attive e clicca automaticamente i bottoni di consenso (es. \"Allow\", \"Yes\") generati dalle IA come Cursor o Claude, prevenendo che si blocchino in attesa del tuo click."}},{"@type":"Question","name":"Come funziona la lettura dei Limiti (OCR)?","acceptedAnswer":{"@type":"Answer","text":"Nella versione Pro, se un'IA ti dice \"Hai superato il limite, riprova alle 14:30\", Chronos legge la frase dallo schermo usando l'OCR locale, mette il programma in pausa e, alle 14:30 in punto, inserisce il comando \"continua\" per fargli riprendere il lavoro."}},{"@type":"Question","name":"Chronos fa degli screenshot o li salva?","acceptedAnswer":{"@type":"Answer","text":"No, Chronos non salva mai alcuna immagine. Usa le librerie native di Accessibilità di Windows per intercettare i bottoni e utilizza l'OCR in RAM (senza salvataggio disco) solo quando strettamente necessario."}},{"@type":"Question","name":"Posso ottenere un rimborso?","acceptedAnswer":{"@type":"Answer","text":"Sì, rimborso completo entro 30 giorni dal primo addebito, senza domande."}},{"@type":"Question","name":"C'è una versione di prova gratuita?","acceptedAnswer":{"@type":"Answer","text":"Starter è gratis per sempre. Pro e Team includono 14 giorni di prova senza carta."}},{"@type":"Question","name":"È compatibile col mio programma?","acceptedAnswer":{"@type":"Answer","text":"Funziona con la stragrande maggioranza delle app native Windows e terminali, come Cursor, Windsurf, Claude Desktop, Command Prompt e PowerShell."}},{"@type":"Question","name":"Riceverò aggiornamenti?","acceptedAnswer":{"@type":"Answer","text":"Sì: tutti i piani ricevono aggiornamenti continui senza costi aggiuntivi. Pro e Team accedono in anteprima alle nuove funzionalità."}}],"datePublished":"2026-02-01","isPartOf":{"@type":"WebSite","@id":"https://chronos-bot.com/#website","name":"Chronos","url":"https://chronos-bot.com/"},"about":{"@type":"WebApplication","@id":"https://chronos-bot.com/#webapp","name":"Chronos","applicationCategory":"DeveloperApplication","operatingSystem":"Windows, Web"},"author":{"@type":"Organization","name":"Chronos","url":"https://chronos-bot.com/"},"speakable":{"@type":"SpeakableSpecification","cssSelector":["#faq h3[data-faq-question]","#faq [data-faq-answer]","#faq"]}}</script>
    <script type="application/ld+json" data-faq-lang="en">{"@context":"https://schema.org","@type":"FAQPage","@id":"https://chronos-bot.com/#faq-en","inLanguage":"en","url":"https://chronos-bot.com/","dateModified":"2026-04-23","publisher":{"@type":"Organization","name":"Chronos","url":"https://chronos-bot.com","logo":{"@type":"ImageObject","url":"https://chronos-bot.com/favicon.png"}},"mainEntity":[{"@type":"Question","name":"What is Chronos?","acceptedAnswer":{"@type":"Answer","text":"Chronos is an Auto-Pilot for Windows: it scans active windows in the background and automatically clicks consent buttons (e.g., \"Allow\", \"Yes\") generated by AIs like Cursor or Claude, preventing them from hanging while waiting for your click."}},{"@type":"Question","name":"How does Limit reading (OCR) work?","acceptedAnswer":{"@type":"Answer","text":"In the Pro version, if an AI tells you \"You have exceeded your limit, please try again at 14:30\", Chronos reads the phrase from the screen using local OCR, pauses the program, and at exactly 14:30, inputs the \"continue\" command so it can resume work."}},{"@type":"Question","name":"Does Chronos take or save screenshots?","acceptedAnswer":{"@type":"Answer","text":"No, Chronos never saves any images. It uses native Windows Accessibility libraries to intercept buttons and uses RAM-based OCR (no disk saving) only when strictly necessary."}},{"@type":"Question","name":"Can I get a refund?","acceptedAnswer":{"@type":"Answer","text":"Yes — full refund within 30 days of first charge, no questions asked."}},{"@type":"Question","name":"Is there a free trial?","acceptedAnswer":{"@type":"Answer","text":"Starter is free forever. Pro and Team include a 14-day trial, no card required."}},{"@type":"Question","name":"Is it compatible with my program?","acceptedAnswer":{"@type":"Answer","text":"It works with the vast majority of native Windows apps and terminals, such as Cursor, Windsurf, Claude Desktop, Command Prompt, and PowerShell."}},{"@type":"Question","name":"Will I get updates?","acceptedAnswer":{"@type":"Answer","text":"Yes: every plan gets continuous updates at no extra cost. Pro and Team get early access to new features."}}],"datePublished":"2026-02-01","isPartOf":{"@type":"WebSite","@id":"https://chronos-bot.com/#website","name":"Chronos","url":"https://chronos-bot.com/"},"about":{"@type":"WebApplication","@id":"https://chronos-bot.com/#webapp","name":"Chronos","applicationCategory":"DeveloperApplication","operatingSystem":"Windows, Web"},"author":{"@type":"Organization","name":"Chronos","url":"https://chronos-bot.com/"},"speakable":{"@type":"SpeakableSpecification","cssSelector":["#faq h3[data-faq-question]","#faq [data-faq-answer]","#faq"]}}</script>
    <script type="application/ld+json" data-faq-lang="de">{"@context":"https://schema.org","@type":"FAQPage","@id":"https://chronos-bot.com/de#faq-de","inLanguage":"de","url":"https://chronos-bot.com/de","dateModified":"2026-04-23","publisher":{"@type":"Organization","name":"Chronos","url":"https://chronos-bot.com","logo":{"@type":"ImageObject","url":"https://chronos-bot.com/favicon.png"}},"mainEntity":[{"@type":"Question","@id":"https://chronos-bot.com/de#faq-de-q1","name":"Was ist Chronos?","acceptedAnswer":{"@type":"Answer","text":"Chronos ist eine Windows-Desktop-Anwendung, die ganze Ordnerstrukturen in Textdateien konvertiert, die für KI-Assistenten wie ChatGPT, Claude und Copilot optimiert sind. Anstatt Dateien einzeln manuell zu kopieren, können Sie Ihren gesamten Projektkontext in Sekunden exportieren.","inLanguage":"de"}},{"@type":"Question","@id":"https://chronos-bot.com/de#faq-de-q2","name":"Wie kaufe und lade ich herunter?","acceptedAnswer":{"@type":"Answer","text":"Alle Käufe erfolgen über den Microsoft Store. Klicken Sie auf \"Aus dem Microsoft Store herunterladen\", um die App-Seite aufzurufen. Zahlung und Lizenzverwaltung werden vollständig von Microsoft abgewickelt.","inLanguage":"de"}},{"@type":"Question","@id":"https://chronos-bot.com/de#faq-de-q3","name":"Was ist der Unterschied zwischen Standard und Pro?","acceptedAnswer":{"@type":"Answer","text":"Die Standard-Lizenz (€14,99 einmalig) umfasst: unbegrenzte Extraktionen bis zu 500 Dateien pro Extraktion, lebenslange Lizenz, Windows-Kontextmenü, Multi-Thread, Desktop-Benachrichtigungen. Pro (€6,99/Monat oder €47,88/Jahr) fügt hinzu: keine Dateilimits pro Extraktion, erweiterte Erweiterungs-/Verzeichnisverwaltung, konfigurierbares Auto-Split, speicherbare Vorlagen und erweiterte Templates.","inLanguage":"de"}},{"@type":"Question","@id":"https://chronos-bot.com/de#faq-de-q4","name":"Kann ich eine Rückerstattung erhalten?","acceptedAnswer":{"@type":"Answer","text":"Rückerstattungen werden gemäß den Richtlinien des Microsoft Store und geltenden Verbraucherschutzgesetzen abgewickelt. Wir bieten keine direkten Rückerstattungen an, da alle Transaktionen über Microsoft laufen.","inLanguage":"de"}},{"@type":"Question","@id":"https://chronos-bot.com/de#faq-de-q5","name":"Gibt es eine kostenlose Testversion?","acceptedAnswer":{"@type":"Answer","text":"Ja! Sie erhalten 3 kostenlose Testversuche, um Chronos vor dem Kauf auszuprobieren. Die Standard-Lizenz ist ein Einmalkauf ohne wiederkehrende Kosten.","inLanguage":"de"}},{"@type":"Question","@id":"https://chronos-bot.com/de#faq-de-q6","name":"Verlassen meine Daten meinen Computer?","acceptedAnswer":{"@type":"Answer","text":"Nein. Chronos läuft zu 100% lokal auf Ihrem Computer. Ihre Codedateien werden niemals hochgeladen, übertragen oder auf externen Servern verarbeitet.","inLanguage":"de"}},{"@type":"Question","@id":"https://chronos-bot.com/de#faq-de-q7","name":"Erhalte ich zukünftige Updates?","acceptedAnswer":{"@type":"Answer","text":"Ja! Standard-Lizenzinhaber erhalten alle Standard-Updates für immer. Pro-Abonnenten erhalten Zugang zu allen Pro-Funktionen bei Veröffentlichung. Updates werden automatisch über den Microsoft Store bereitgestellt.","inLanguage":"de"}}],"datePublished":"2026-02-01","isPartOf":{"@type":"WebSite","@id":"https://chronos-bot.com/#website","name":"Chronos","url":"https://chronos-bot.com/"},"about":{"@type":"WebApplication","@id":"https://chronos-bot.com/#webapp","name":"Chronos","applicationCategory":"DeveloperApplication","operatingSystem":"Windows, Web"},"author":{"@type":"Organization","name":"Chronos","url":"https://chronos-bot.com/"},"speakable":{"@type":"SpeakableSpecification","cssSelector":["#faq h3[data-faq-question]","#faq [data-faq-answer]","#faq"]}}</script>
    <script type="application/ld+json" data-faq-lang="fr">{"@context":"https://schema.org","@type":"FAQPage","@id":"https://chronos-bot.com/fr#faq-fr","inLanguage":"fr","url":"https://chronos-bot.com/fr","dateModified":"2026-04-23","publisher":{"@type":"Organization","name":"Chronos","url":"https://chronos-bot.com","logo":{"@type":"ImageObject","url":"https://chronos-bot.com/favicon.png"}},"mainEntity":[{"@type":"Question","@id":"https://chronos-bot.com/fr#faq-fr-q1","name":"Qu'est-ce que Chronos ?","acceptedAnswer":{"@type":"Answer","text":"Chronos est une application Windows qui convertit des structures de dossiers entières en fichiers texte optimisés pour les assistants IA comme ChatGPT, Claude et Copilot. Au lieu de copier manuellement les fichiers un par un, vous pouvez exporter tout le contexte de votre projet en quelques secondes.","inLanguage":"fr"}},{"@type":"Question","@id":"https://chronos-bot.com/fr#faq-fr-q2","name":"Comment acheter et télécharger ?","acceptedAnswer":{"@type":"Answer","text":"Tous les achats se font via le Microsoft Store. Cliquez sur \"Télécharger depuis le Microsoft Store\" pour accéder à la page de l'application. Le paiement et la gestion des licences sont entièrement gérés par Microsoft.","inLanguage":"fr"}},{"@type":"Question","@id":"https://chronos-bot.com/fr#faq-fr-q3","name":"Quelle est la différence entre Standard et Pro ?","acceptedAnswer":{"@type":"Answer","text":"La licence Standard (14,99 € unique) inclut : extractions illimitées jusqu'à 500 fichiers par extraction, licence à vie, menu contextuel Windows, multi-thread, notifications de bureau. Pro (6,99 €/mois ou 47,88 €/an) ajoute : aucune limite de fichiers par extraction, gestion avancée, auto-split configurable, préréglages et modèles avancés.","inLanguage":"fr"}},{"@type":"Question","@id":"https://chronos-bot.com/fr#faq-fr-q4","name":"Puis-je obtenir un remboursement ?","acceptedAnswer":{"@type":"Answer","text":"Les remboursements sont gérés selon les politiques du Microsoft Store et les lois applicables. Nous ne fournissons pas de remboursements directs car toutes les transactions passent par Microsoft.","inLanguage":"fr"}},{"@type":"Question","@id":"https://chronos-bot.com/fr#faq-fr-q5","name":"Y a-t-il un essai gratuit ?","acceptedAnswer":{"@type":"Answer","text":"Oui ! Vous bénéficiez de 3 essais gratuits pour essayer Chronos avant d'acheter. La licence Standard est un achat unique sans frais récurrents.","inLanguage":"fr"}},{"@type":"Question","@id":"https://chronos-bot.com/fr#faq-fr-q6","name":"Mes données quittent-elles mon ordinateur ?","acceptedAnswer":{"@type":"Answer","text":"Non. Chronos fonctionne à 100% localement sur votre machine. Vos fichiers de code ne sont jamais téléchargés, transmis ou traités sur un serveur externe.","inLanguage":"fr"}},{"@type":"Question","@id":"https://chronos-bot.com/fr#faq-fr-q7","name":"Recevrai-je les futures mises à jour ?","acceptedAnswer":{"@type":"Answer","text":"Oui ! Les détenteurs de licence Standard reçoivent toutes les mises à jour standard pour toujours. Les abonnés Pro ont accès à toutes les fonctionnalités Pro dès leur lancement. Les mises à jour sont livrées automatiquement via le Microsoft Store.","inLanguage":"fr"}}],"datePublished":"2026-02-01","isPartOf":{"@type":"WebSite","@id":"https://chronos-bot.com/#website","name":"Chronos","url":"https://chronos-bot.com/"},"about":{"@type":"WebApplication","@id":"https://chronos-bot.com/#webapp","name":"Chronos","applicationCategory":"DeveloperApplication","operatingSystem":"Windows, Web"},"author":{"@type":"Organization","name":"Chronos","url":"https://chronos-bot.com/"},"speakable":{"@type":"SpeakableSpecification","cssSelector":["#faq h3[data-faq-question]","#faq [data-faq-answer]","#faq"]}}</script>

    <script type="application/ld+json" data-faq-lang="pt">{"@context":"https://schema.org","@type":"FAQPage","@id":"https://chronos-bot.com/pt#faq-pt","inLanguage":"pt","url":"https://chronos-bot.com/pt","dateModified":"2026-04-23","publisher":{"@type":"Organization","name":"Chronos","url":"https://chronos-bot.com","logo":{"@type":"ImageObject","url":"https://chronos-bot.com/favicon.png"}},"mainEntity":[{"@type":"Question","@id":"https://chronos-bot.com/pt#faq-pt-q1","name":"O que é o Chronos?","acceptedAnswer":{"@type":"Answer","text":"Chronos é uma aplicação Windows que converte estruturas de pastas inteiras em ficheiros de texto otimizados para assistentes IA como ChatGPT, Claude e Copilot. Em vez de copiar ficheiros manualmente um a um, pode exportar todo o contexto do seu projeto em segundos.","inLanguage":"pt"}},{"@type":"Question","@id":"https://chronos-bot.com/pt#faq-pt-q2","name":"Como compro e transfiro?","acceptedAnswer":{"@type":"Answer","text":"Todas as compras são feitas através da Microsoft Store. Clique em \\\"Transferir da Microsoft Store\\\" para aceder à página da app. O pagamento e gestão de licenças são inteiramente geridos pela Microsoft.","inLanguage":"pt"}},{"@type":"Question","@id":"https://chronos-bot.com/pt#faq-pt-q3","name":"Qual é a diferença entre Standard e Pro?","acceptedAnswer":{"@type":"Answer","text":"A licença Standard (€14,99 único) inclui: extrações ilimitadas até 500 ficheiros por extração, licença vitalícia, menu de contexto Windows, multi-thread, notificações. Pro (€6,99/mês ou €47,88/ano) adiciona: sem limite de ficheiros, gestão avançada, auto-divisão configurável, predefinições e modelos avançados.","inLanguage":"pt"}},{"@type":"Question","@id":"https://chronos-bot.com/pt#faq-pt-q4","name":"Posso obter um reembolso?","acceptedAnswer":{"@type":"Answer","text":"Os reembolsos são geridos de acordo com as políticas da Microsoft Store e leis de proteção do consumidor. Não fornecemos reembolsos diretos.","inLanguage":"pt"}},{"@type":"Question","@id":"https://chronos-bot.com/pt#faq-pt-q5","name":"Existe um teste gratuito?","acceptedAnswer":{"@type":"Answer","text":"Sim! Tem 3 testes gratuitos para experimentar o Chronos antes de comprar. A licença Standard é uma compra única sem custos recorrentes.","inLanguage":"pt"}},{"@type":"Question","@id":"https://chronos-bot.com/pt#faq-pt-q6","name":"Os meus dados saem do meu computador?","acceptedAnswer":{"@type":"Answer","text":"Não. O Chronos funciona 100% localmente na sua máquina. Os seus ficheiros de código nunca são carregados, transmitidos ou processados em servidores externos.","inLanguage":"pt"}},{"@type":"Question","@id":"https://chronos-bot.com/pt#faq-pt-q7","name":"Receberei atualizações futuras?","acceptedAnswer":{"@type":"Answer","text":"Sim! Os titulares de licença Standard recebem todas as atualizações standard para sempre. Os subscritores Pro obtêm acesso a todas as funcionalidades Pro ao serem lançadas. As atualizações são entregues automaticamente através da Microsoft Store.","inLanguage":"pt"}}],"datePublished":"2026-02-01","isPartOf":{"@type":"WebSite","@id":"https://chronos-bot.com/#website","name":"Chronos","url":"https://chronos-bot.com/"},"about":{"@type":"WebApplication","@id":"https://chronos-bot.com/#webapp","name":"Chronos","applicationCategory":"DeveloperApplication","operatingSystem":"Windows, Web"},"author":{"@type":"Organization","name":"Chronos","url":"https://chronos-bot.com/"},"speakable":{"@type":"SpeakableSpecification","cssSelector":["#faq h3[data-faq-question]","#faq [data-faq-answer]","#faq"]}}</script>
    <script type="application/ld+json" data-faq-lang="nl">{"@context":"https://schema.org","@type":"FAQPage","@id":"https://chronos-bot.com/nl#faq-nl","inLanguage":"nl","url":"https://chronos-bot.com/nl","dateModified":"2026-04-23","publisher":{"@type":"Organization","name":"Chronos","url":"https://chronos-bot.com","logo":{"@type":"ImageObject","url":"https://chronos-bot.com/favicon.png"}},"mainEntity":[{"@type":"Question","@id":"https://chronos-bot.com/nl#faq-nl-q1","name":"Wat is Chronos?","acceptedAnswer":{"@type":"Answer","text":"Chronos is een Windows-desktopapplicatie die volledige mapstructuren omzet in tekstbestanden geoptimaliseerd voor AI-assistenten zoals ChatGPT, Claude en Copilot. In plaats van handmatig bestanden één voor één te kopiëren, kunt u uw volledige projectcontext in seconden exporteren.","inLanguage":"nl"}},{"@type":"Question","@id":"https://chronos-bot.com/nl#faq-nl-q2","name":"Hoe koop en download ik?","acceptedAnswer":{"@type":"Answer","text":"Alle aankopen worden gedaan via de Microsoft Store. Klik op \"Download uit Microsoft Store\" om de app-pagina te openen. Betaling en licentiebeheer worden volledig door Microsoft afgehandeld.","inLanguage":"nl"}},{"@type":"Question","@id":"https://chronos-bot.com/nl#faq-nl-q3","name":"Wat is het verschil tussen Standard en Pro?","acceptedAnswer":{"@type":"Answer","text":"De Standaard licentie (€14,99 eenmalig) omvat: onbeperkte extracties tot 500 bestanden per extractie, levenslange licentie, Windows contextmenu, multi-thread verwerking, desktopmeldingen. Pro (€6,99/mnd of €47,88/jaar) voegt toe: geen bestandslimieten, geavanceerd extensie-/mapbeheer, configureerbare auto-splitsing, opslaan van presets en geavanceerde templates.","inLanguage":"nl"}},{"@type":"Question","@id":"https://chronos-bot.com/nl#faq-nl-q4","name":"Kan ik een restitutie krijgen?","acceptedAnswer":{"@type":"Answer","text":"Restituties worden afgehandeld volgens het beleid van Microsoft Store en toepasselijke consumentenwetten. Wij bieden geen directe restituties aan, aangezien alle transacties via Microsoft verlopen.","inLanguage":"nl"}},{"@type":"Question","@id":"https://chronos-bot.com/nl#faq-nl-q5","name":"Is er een gratis proefversie?","acceptedAnswer":{"@type":"Answer","text":"Ja! U krijgt 3 gratis proefversies om Chronos uit te proberen voordat u koopt. De Standaard licentie is een eenmalige aankoop zonder terugkerende kosten.","inLanguage":"nl"}},{"@type":"Question","@id":"https://chronos-bot.com/nl#faq-nl-q6","name":"Verlaten mijn gegevens mijn computer?","acceptedAnswer":{"@type":"Answer","text":"Nee. Chronos draait 100% lokaal op uw machine. Uw codebestanden worden nooit geüpload, verzonden of verwerkt op een externe server.","inLanguage":"nl"}},{"@type":"Question","@id":"https://chronos-bot.com/nl#faq-nl-q7","name":"Krijg ik toekomstige updates?","acceptedAnswer":{"@type":"Answer","text":"Ja! Standaard licentiehouders ontvangen alle standaard functie-updates voor altijd. Pro-abonnees krijgen toegang tot alle Pro-functies zodra ze beschikbaar komen. Updates worden automatisch geleverd via de Microsoft Store.","inLanguage":"nl"}}],"datePublished":"2026-02-01","isPartOf":{"@type":"WebSite","@id":"https://chronos-bot.com/#website","name":"Chronos","url":"https://chronos-bot.com/"},"about":{"@type":"WebApplication","@id":"https://chronos-bot.com/#webapp","name":"Chronos","applicationCategory":"DeveloperApplication","operatingSystem":"Windows, Web"},"author":{"@type":"Organization","name":"Chronos","url":"https://chronos-bot.com/"},"speakable":{"@type":"SpeakableSpecification","cssSelector":["#faq h3[data-faq-question]","#faq [data-faq-answer]","#faq"]}}</script>
    <script type="application/ld+json" data-faq-lang="pl">{"@context":"https://schema.org","@type":"FAQPage","@id":"https://chronos-bot.com/pl#faq-pl","inLanguage":"pl","url":"https://chronos-bot.com/pl","dateModified":"2026-04-23","publisher":{"@type":"Organization","name":"Chronos","url":"https://chronos-bot.com","logo":{"@type":"ImageObject","url":"https://chronos-bot.com/favicon.png"}},"mainEntity":[{"@type":"Question","@id":"https://chronos-bot.com/pl#faq-pl-q1","name":"Czym jest Chronos?","acceptedAnswer":{"@type":"Answer","text":"Chronos to aplikacja desktopowa dla Windows, która konwertuje całe struktury folderów na pliki tekstowe zoptymalizowane dla asystentów AI takich jak ChatGPT, Claude i Copilot. Zamiast ręcznie kopiować pliki jeden po drugim, możesz wyeksportować cały kontekst projektu w sekundy.","inLanguage":"pl"}},{"@type":"Question","@id":"https://chronos-bot.com/pl#faq-pl-q2","name":"Jak kupić i pobrać?","acceptedAnswer":{"@type":"Answer","text":"Wszystkie zakupy są dokonywane przez Microsoft Store. Kliknij \"Pobierz z Microsoft Store\", aby otworzyć stronę aplikacji. Płatność i zarządzanie licencjami jest obsługiwane w całości przez Microsoft.","inLanguage":"pl"}},{"@type":"Question","@id":"https://chronos-bot.com/pl#faq-pl-q3","name":"Jaka jest różnica między Standard a Pro?","acceptedAnswer":{"@type":"Answer","text":"Licencja Standard (€14,99 jednorazowo) obejmuje: nieograniczone ekstrakcje do 500 plików, dożywotnia licencja, menu kontekstowe Windows, przetwarzanie wielowątkowe, powiadomienia. Pro (€6,99/mies. lub €47,88/rok) dodaje: brak limitów plików, zaawansowane zarządzanie, konfigurowalny auto-podział, presety i szablony.","inLanguage":"pl"}},{"@type":"Question","@id":"https://chronos-bot.com/pl#faq-pl-q4","name":"Czy mogę uzyskać zwrot?","acceptedAnswer":{"@type":"Answer","text":"Zwroty są obsługiwane zgodnie z zasadami Microsoft Store i obowiązującymi przepisami o ochronie konsumentów. Nie zapewniamy bezpośrednich zwrotów.","inLanguage":"pl"}},{"@type":"Question","@id":"https://chronos-bot.com/pl#faq-pl-q5","name":"Czy jest darmowa wersja próbna?","acceptedAnswer":{"@type":"Answer","text":"Tak! Otrzymujesz 3 darmowe próby Chronos przed zakupem. Licencja Standard to jednorazowy zakup bez opłat cyklicznych.","inLanguage":"pl"}},{"@type":"Question","@id":"https://chronos-bot.com/pl#faq-pl-q6","name":"Czy moje dane opuszczają komputer?","acceptedAnswer":{"@type":"Answer","text":"Nie. Chronos działa w 100% lokalnie na Twoim komputerze. Twoje pliki kodu nigdy nie są przesyłane ani przetwarzane na żadnym zewnętrznym serwerze.","inLanguage":"pl"}},{"@type":"Question","@id":"https://chronos-bot.com/pl#faq-pl-q7","name":"Czy otrzymam przyszłe aktualizacje?","acceptedAnswer":{"@type":"Answer","text":"Tak! Posiadacze licencji Standard otrzymują wszystkie standardowe aktualizacje na zawsze. Subskrybenci Pro otrzymują dostęp do wszystkich funkcji Pro w miarę ich premiery. Aktualizacje są dostarczane automatycznie przez Microsoft Store.","inLanguage":"pl"}}],"datePublished":"2026-02-01","isPartOf":{"@type":"WebSite","@id":"https://chronos-bot.com/#website","name":"Chronos","url":"https://chronos-bot.com/"},"about":{"@type":"WebApplication","@id":"https://chronos-bot.com/#webapp","name":"Chronos","applicationCategory":"DeveloperApplication","operatingSystem":"Windows, Web"},"author":{"@type":"Organization","name":"Chronos","url":"https://chronos-bot.com/"},"speakable":{"@type":"SpeakableSpecification","cssSelector":["#faq h3[data-faq-question]","#faq [data-faq-answer]","#faq"]}}</script>
    <script type="application/ld+json" data-faq-lang="sv">{"@context":"https://schema.org","@type":"FAQPage","@id":"https://chronos-bot.com/sv#faq-sv","inLanguage":"sv","url":"https://chronos-bot.com/sv","dateModified":"2026-04-23","publisher":{"@type":"Organization","name":"Chronos","url":"https://chronos-bot.com","logo":{"@type":"ImageObject","url":"https://chronos-bot.com/favicon.png"}},"mainEntity":[{"@type":"Question","@id":"https://chronos-bot.com/sv#faq-sv-q1","name":"Vad är Chronos?","acceptedAnswer":{"@type":"Answer","text":"Chronos är ett Windows-skrivbordsprogram som konverterar hela mappstrukturer till textfiler optimerade för AI-assistenter som ChatGPT, Claude och Copilot. Istället för att manuellt kopiera filer en i taget kan du exportera hela projektets kontext på sekunder.","inLanguage":"sv"}},{"@type":"Question","@id":"https://chronos-bot.com/sv#faq-sv-q2","name":"Hur köper och laddar jag ner?","acceptedAnswer":{"@type":"Answer","text":"Alla köp görs via Microsoft Store. Klicka på \"Ladda ner från Microsoft Store\" för att öppna appsidan. Betalning och licenshantering sköts helt av Microsoft.","inLanguage":"sv"}},{"@type":"Question","@id":"https://chronos-bot.com/sv#faq-sv-q3","name":"Vad är skillnaden mellan Standard och Pro?","acceptedAnswer":{"@type":"Answer","text":"Standard-licensen (€14,99 engång) inkluderar: obegränsade extraktioner upp till 500 filer, livstidslicens, Windows-kontextmeny, flertrådad bearbetning, aviseringar. Pro (€6,99/mån eller €47,88/år) lägger till: inga filgränser, avancerad fil-/mapphantering, konfigurerbar auto-uppdelning, sparbara förinställningar och mallar.","inLanguage":"sv"}},{"@type":"Question","@id":"https://chronos-bot.com/sv#faq-sv-q4","name":"Kan jag få återbetalning?","acceptedAnswer":{"@type":"Answer","text":"Återbetalningar hanteras enligt Microsoft Stores policyer och tillämplig konsumentlagstiftning. Vi erbjuder inte direkta återbetalningar.","inLanguage":"sv"}},{"@type":"Question","@id":"https://chronos-bot.com/sv#faq-sv-q5","name":"Finns det en gratis testversion?","acceptedAnswer":{"@type":"Answer","text":"Ja! Du får 3 gratis provperioder för att testa Chronos innan köp. Standard-licensen är ett engångsköp utan återkommande avgifter.","inLanguage":"sv"}},{"@type":"Question","@id":"https://chronos-bot.com/sv#faq-sv-q6","name":"Lämnar mina data min dator?","acceptedAnswer":{"@type":"Answer","text":"Nej. Chronos körs 100% lokalt på din maskin. Dina kodfiler laddas aldrig upp, överförs eller bearbetas på någon extern server.","inLanguage":"sv"}},{"@type":"Question","@id":"https://chronos-bot.com/sv#faq-sv-q7","name":"Får jag framtida uppdateringar?","acceptedAnswer":{"@type":"Answer","text":"Ja! Standard-licensinnehavare får alla standarduppdateringar för alltid. Pro-prenumeranter får tillgång till alla Pro-funktioner allteftersom de lanseras. Uppdateringar levereras automatiskt via Microsoft Store.","inLanguage":"sv"}}],"datePublished":"2026-02-01","isPartOf":{"@type":"WebSite","@id":"https://chronos-bot.com/#website","name":"Chronos","url":"https://chronos-bot.com/"},"about":{"@type":"WebApplication","@id":"https://chronos-bot.com/#webapp","name":"Chronos","applicationCategory":"DeveloperApplication","operatingSystem":"Windows, Web"},"author":{"@type":"Organization","name":"Chronos","url":"https://chronos-bot.com/"},"speakable":{"@type":"SpeakableSpecification","cssSelector":["#faq h3[data-faq-question]","#faq [data-faq-answer]","#faq"]}}</script>
    <script type="application/ld+json" data-faq-lang="no">{"@context":"https://schema.org","@type":"FAQPage","@id":"https://chronos-bot.com/no#faq-no","inLanguage":"no","url":"https://chronos-bot.com/no","dateModified":"2026-04-23","publisher":{"@type":"Organization","name":"Chronos","url":"https://chronos-bot.com","logo":{"@type":"ImageObject","url":"https://chronos-bot.com/favicon.png"}},"mainEntity":[{"@type":"Question","@id":"https://chronos-bot.com/no#faq-no-q1","name":"Hva er Chronos?","acceptedAnswer":{"@type":"Answer","text":"Chronos er et Windows-skrivbordsprogram som konverterer hele mappestrukturer til tekstfiler optimalisert for AI-assistenter som ChatGPT, Claude og Copilot. I stedet for å manuelt kopiere filer én etter én, kan du eksportere hele prosjektkonteksten på sekunder.","inLanguage":"no"}},{"@type":"Question","@id":"https://chronos-bot.com/no#faq-no-q2","name":"Hvordan kjøper og laster jeg ned?","acceptedAnswer":{"@type":"Answer","text":"Alle kjøp gjøres gjennom Microsoft Store. Klikk på \"Last ned fra Microsoft Store\" for å åpne appsiden. Betaling og lisensadministrasjon håndteres helt av Microsoft.","inLanguage":"no"}},{"@type":"Question","@id":"https://chronos-bot.com/no#faq-no-q3","name":"Hva er forskjellen mellom Standard og Pro?","acceptedAnswer":{"@type":"Answer","text":"Standard-lisensen (€14,99 engangs) inkluderer: ubegrensede ekstraksjoner opp til 500 filer, livstidslisens, Windows-kontekstmeny, flertrådet behandling, varsler. Pro (€6,99/mnd eller €47,88/år) legger til: ingen filgrenser, avansert fil-/mappeadministrasjon, konfigurerbar auto-oppdeling, forhåndsinnstillinger og maler.","inLanguage":"no"}},{"@type":"Question","@id":"https://chronos-bot.com/no#faq-no-q4","name":"Kan jeg få refusjon?","acceptedAnswer":{"@type":"Answer","text":"Refusjoner håndteres i henhold til Microsoft Stores retningslinjer og gjeldende forbrukerlovgivning. Vi tilbyr ikke direkte refusjoner.","inLanguage":"no"}},{"@type":"Question","@id":"https://chronos-bot.com/no#faq-no-q5","name":"Finnes det en gratis prøveversjon?","acceptedAnswer":{"@type":"Answer","text":"Ja! Du får 3 gratis prøver av Chronos før du kjøper. Standard-lisensen er et engangskjøp uten gjentakende avgifter.","inLanguage":"no"}},{"@type":"Question","@id":"https://chronos-bot.com/no#faq-no-q6","name":"Forlater dataene mine datamaskinen?","acceptedAnswer":{"@type":"Answer","text":"Nei. Chronos kjører 100% lokalt på maskinen din. Kodefilene dine blir aldri lastet opp, overført eller behandlet på noen ekstern server.","inLanguage":"no"}},{"@type":"Question","@id":"https://chronos-bot.com/no#faq-no-q7","name":"Får jeg fremtidige oppdateringer?","acceptedAnswer":{"@type":"Answer","text":"Ja! Standard-lisensinnehavere mottar alle standardoppdateringer for alltid. Pro-abonnenter får tilgang til alle Pro-funksjoner etter hvert som de lanseres. Oppdateringer leveres automatisk gjennom Microsoft Store.","inLanguage":"no"}}],"datePublished":"2026-02-01","isPartOf":{"@type":"WebSite","@id":"https://chronos-bot.com/#website","name":"Chronos","url":"https://chronos-bot.com/"},"about":{"@type":"WebApplication","@id":"https://chronos-bot.com/#webapp","name":"Chronos","applicationCategory":"DeveloperApplication","operatingSystem":"Windows, Web"},"author":{"@type":"Organization","name":"Chronos","url":"https://chronos-bot.com/"},"speakable":{"@type":"SpeakableSpecification","cssSelector":["#faq h3[data-faq-question]","#faq [data-faq-answer]","#faq"]}}</script>
    <script type="application/ld+json" data-faq-lang="da">{"@context":"https://schema.org","@type":"FAQPage","@id":"https://chronos-bot.com/da#faq-da","inLanguage":"da","url":"https://chronos-bot.com/da","dateModified":"2026-04-23","publisher":{"@type":"Organization","name":"Chronos","url":"https://chronos-bot.com","logo":{"@type":"ImageObject","url":"https://chronos-bot.com/favicon.png"}},"mainEntity":[{"@type":"Question","@id":"https://chronos-bot.com/da#faq-da-q1","name":"Hvad er Chronos?","acceptedAnswer":{"@type":"Answer","text":"Chronos er et Windows-skrivbordsprogram der konverterer hele mappestrukturer til tekstfiler optimeret til AI-assistenter som ChatGPT, Claude og Copilot. I stedet for manuelt at kopiere filer én ad gangen kan du eksportere hele projektkonteksten på sekunder.","inLanguage":"da"}},{"@type":"Question","@id":"https://chronos-bot.com/da#faq-da-q2","name":"Hvordan køber og downloader jeg?","acceptedAnswer":{"@type":"Answer","text":"Alle køb foretages via Microsoft Store. Klik på \"Download fra Microsoft Store\" for at åbne appsiden. Betaling og licensadministration håndteres helt af Microsoft.","inLanguage":"da"}},{"@type":"Question","@id":"https://chronos-bot.com/da#faq-da-q3","name":"Hvad er forskellen mellem Standard og Pro?","acceptedAnswer":{"@type":"Answer","text":"Standard-licensen (€14,99 engang) inkluderer: ubegrænsede ekstraktioner op til 500 filer, livstidslicens, Windows-kontekstmenu, flertrådet behandling, notifikationer. Pro (€6,99/mdr eller €47,88/år) tilføjer: ingen filgrænser, avanceret fil-/mappeadministration, konfigurerbar auto-opdeling, forudindstillinger og skabeloner.","inLanguage":"da"}},{"@type":"Question","@id":"https://chronos-bot.com/da#faq-da-q4","name":"Kan jeg få refusion?","acceptedAnswer":{"@type":"Answer","text":"Refusioner håndteres i henhold til Microsoft Stores politikker og gældende forbrugerbeskyttelseslovgivning. Vi tilbyder ikke direkte refusioner.","inLanguage":"da"}},{"@type":"Question","@id":"https://chronos-bot.com/da#faq-da-q5","name":"Er der en gratis prøveversion?","acceptedAnswer":{"@type":"Answer","text":"Ja! Du får 3 gratis prøver af Chronos før køb. Standard-licensen er et engangskøb uden tilbagevendende gebyrer.","inLanguage":"da"}},{"@type":"Question","@id":"https://chronos-bot.com/da#faq-da-q6","name":"Forlader mine data min computer?","acceptedAnswer":{"@type":"Answer","text":"Nej. Chronos kører 100% lokalt på din maskine. Dine kodefiler uploades, overføres eller behandles aldrig på nogen ekstern server.","inLanguage":"da"}},{"@type":"Question","@id":"https://chronos-bot.com/da#faq-da-q7","name":"Får jeg fremtidige opdateringer?","acceptedAnswer":{"@type":"Answer","text":"Ja! Standard-licensindehavere modtager alle standardopdateringer for altid. Pro-abonnenter får adgang til alle Pro-funktioner efterhånden som de lanceres. Opdateringer leveres automatisk via Microsoft Store.","inLanguage":"da"}}],"datePublished":"2026-02-01","isPartOf":{"@type":"WebSite","@id":"https://chronos-bot.com/#website","name":"Chronos","url":"https://chronos-bot.com/"},"about":{"@type":"WebApplication","@id":"https://chronos-bot.com/#webapp","name":"Chronos","applicationCategory":"DeveloperApplication","operatingSystem":"Windows, Web"},"author":{"@type":"Organization","name":"Chronos","url":"https://chronos-bot.com/"},"speakable":{"@type":"SpeakableSpecification","cssSelector":["#faq h3[data-faq-question]","#faq [data-faq-answer]","#faq"]}}</script>
    <script type="application/ld+json" data-faq-lang="fi">{"@context":"https://schema.org","@type":"FAQPage","@id":"https://chronos-bot.com/fi#faq-fi","inLanguage":"fi","url":"https://chronos-bot.com/fi","dateModified":"2026-04-23","publisher":{"@type":"Organization","name":"Chronos","url":"https://chronos-bot.com","logo":{"@type":"ImageObject","url":"https://chronos-bot.com/favicon.png"}},"mainEntity":[{"@type":"Question","@id":"https://chronos-bot.com/fi#faq-fi-q1","name":"Mikä on Chronos?","acceptedAnswer":{"@type":"Answer","text":"Chronos on Windows-työpöytäsovellus, joka muuntaa kokonaiset kansiorakenteet AI-avustajille kuten ChatGPT, Claude ja Copilot optimoiduiksi tekstitiedostoiksi. Sen sijaan, että kopioisit tiedostoja manuaalisesti yksi kerrallaan, voit viedä koko projektikontekstin sekunneissa.","inLanguage":"fi"}},{"@type":"Question","@id":"https://chronos-bot.com/fi#faq-fi-q2","name":"Miten ostan ja lataan?","acceptedAnswer":{"@type":"Answer","text":"Kaikki ostot tehdään Microsoft Storen kautta. Napsauta \"Lataa Microsoft Storesta\" avataksesi sovellussivun. Maksu ja lisenssinhallinta hoidetaan kokonaan Microsoftin toimesta.","inLanguage":"fi"}},{"@type":"Question","@id":"https://chronos-bot.com/fi#faq-fi-q3","name":"Mikä on Standardin ja Pron ero?","acceptedAnswer":{"@type":"Answer","text":"Standardi-lisenssi (€14,99 kertamaksu) sisältää: rajattomat ekstraktiot max 500 tiedostolla, elinikäinen lisenssi, Windowsin kontekstivalikko, monisäikeinen käsittely, ilmoitukset. Pro (€6,99/kk tai €47,88/v) lisää: ei tiedostorajoja, edistynyt tiedosto-/kansiohallinta, konfiguroitava automaattinen jako, esiasetukset ja mallit.","inLanguage":"fi"}},{"@type":"Question","@id":"https://chronos-bot.com/fi#faq-fi-q4","name":"Voinko saada palautuksen?","acceptedAnswer":{"@type":"Answer","text":"Palautukset käsitellään Microsoft Storen käytäntöjen ja sovellettavan kuluttajansuojalainsäädännön mukaisesti. Emme tarjoa suoria palautuksia.","inLanguage":"fi"}},{"@type":"Question","@id":"https://chronos-bot.com/fi#faq-fi-q5","name":"Onko ilmainen kokeiluversio?","acceptedAnswer":{"@type":"Answer","text":"Kyllä! Saat 3 ilmaista kokeilua Chronosistä ennen ostoa. Standardi-lisenssi on kertaosto ilman toistuvia maksuja.","inLanguage":"fi"}},{"@type":"Question","@id":"https://chronos-bot.com/fi#faq-fi-q6","name":"Lähtevätkö tietoni tietokoneeltani?","acceptedAnswer":{"@type":"Answer","text":"Ei. Chronos toimii 100% paikallisesti koneellasi. Kooditiedostojasi ei koskaan ladata, siirretä tai käsitellä millään ulkoisella palvelimella.","inLanguage":"fi"}},{"@type":"Question","@id":"https://chronos-bot.com/fi#faq-fi-q7","name":"Saanko tulevat päivitykset?","acceptedAnswer":{"@type":"Answer","text":"Kyllä! Standardi-lisenssin haltijat saavat kaikki standardipäivitykset ikuisesti. Pro-tilaajat saavat pääsyn kaikkiin Pro-ominaisuuksiin sitä mukaa kun ne julkaistaan. Päivitykset toimitetaan automaattisesti Microsoft Storen kautta.","inLanguage":"fi"}}],"datePublished":"2026-02-01","isPartOf":{"@type":"WebSite","@id":"https://chronos-bot.com/#website","name":"Chronos","url":"https://chronos-bot.com/"},"about":{"@type":"WebApplication","@id":"https://chronos-bot.com/#webapp","name":"Chronos","applicationCategory":"DeveloperApplication","operatingSystem":"Windows, Web"},"author":{"@type":"Organization","name":"Chronos","url":"https://chronos-bot.com/"},"speakable":{"@type":"SpeakableSpecification","cssSelector":["#faq h3[data-faq-question]","#faq [data-faq-answer]","#faq"]}}</script>
    <script type="application/ld+json" data-faq-lang="cs">{"@context":"https://schema.org","@type":"FAQPage","@id":"https://chronos-bot.com/cs#faq-cs","inLanguage":"cs","url":"https://chronos-bot.com/cs","dateModified":"2026-04-23","publisher":{"@type":"Organization","name":"Chronos","url":"https://chronos-bot.com","logo":{"@type":"ImageObject","url":"https://chronos-bot.com/favicon.png"}},"mainEntity":[{"@type":"Question","@id":"https://chronos-bot.com/cs#faq-cs-q1","name":"Co je Chronos?","acceptedAnswer":{"@type":"Answer","text":"Chronos je desktopová aplikace pro Windows, která převádí celé struktury složek na textové soubory optimalizované pro AI asistenty jako ChatGPT, Claude a Copilot. Místo ručního kopírování souborů jeden po druhém můžete exportovat celý kontext projektu během sekund.","inLanguage":"cs"}},{"@type":"Question","@id":"https://chronos-bot.com/cs#faq-cs-q2","name":"Jak koupím a stáhnu?","acceptedAnswer":{"@type":"Answer","text":"Všechny nákupy probíhají přes Microsoft Store. Klikněte na \"Stáhnout z Microsoft Store\" pro otevření stránky aplikace. Platbu a správu licencí zajišťuje kompletně Microsoft.","inLanguage":"cs"}},{"@type":"Question","@id":"https://chronos-bot.com/cs#faq-cs-q3","name":"Jaký je rozdíl mezi Standard a Pro?","acceptedAnswer":{"@type":"Answer","text":"Standardní licence (€14,99 jednorázově): neomezené extrakce do 500 souborů, doživotní licence, kontextová nabídka, vícevláknové zpracování, notifikace. Pro (€6,99/měs. nebo €47,88/rok) přidává: bez limitů souborů, pokročilou správu, automatické dělení, presety a šablony.","inLanguage":"cs"}},{"@type":"Question","@id":"https://chronos-bot.com/cs#faq-cs-q4","name":"Mohu získat vrácení peněz?","acceptedAnswer":{"@type":"Answer","text":"Vrácení peněz se řídí zásadami Microsoft Store a platnými zákony na ochranu spotřebitele. Neposkytujeme přímé vrácení peněz.","inLanguage":"cs"}},{"@type":"Question","@id":"https://chronos-bot.com/cs#faq-cs-q5","name":"Existuje bezplatná zkušební verze?","acceptedAnswer":{"@type":"Answer","text":"Ano! Dostanete 3 bezplatné zkušební verze Chronos před nákupem. Standardní licence je jednorázový nákup bez opakovaných poplatků.","inLanguage":"cs"}},{"@type":"Question","@id":"https://chronos-bot.com/cs#faq-cs-q6","name":"Opouštějí moje data počítač?","acceptedAnswer":{"@type":"Answer","text":"Ne. Chronos běží 100% lokálně na vašem počítači. Vaše soubory s kódem se nikdy nenahrávají, nepřenášejí ani nezpracovávají na žádném externím serveru.","inLanguage":"cs"}},{"@type":"Question","@id":"https://chronos-bot.com/cs#faq-cs-q7","name":"Dostanu budoucí aktualizace?","acceptedAnswer":{"@type":"Answer","text":"Ano! Držitelé Standardní licence dostávají všechny standardní aktualizace navždy. Předplatitelé Pro získávají přístup ke všem Pro funkcím, jak jsou vydávány. Aktualizace jsou doručovány automaticky přes Microsoft Store.","inLanguage":"cs"}}],"datePublished":"2026-02-01","isPartOf":{"@type":"WebSite","@id":"https://chronos-bot.com/#website","name":"Chronos","url":"https://chronos-bot.com/"},"about":{"@type":"WebApplication","@id":"https://chronos-bot.com/#webapp","name":"Chronos","applicationCategory":"DeveloperApplication","operatingSystem":"Windows, Web"},"author":{"@type":"Organization","name":"Chronos","url":"https://chronos-bot.com/"},"speakable":{"@type":"SpeakableSpecification","cssSelector":["#faq h3[data-faq-question]","#faq [data-faq-answer]","#faq"]}}</script>
    <script type="application/ld+json" data-faq-lang="el" data-faq-fallback-from="en">{"@context":"https://schema.org","@type":"FAQPage","@id":"https://chronos-bot.com/el#faq-el","inLanguage":"el","url":"https://chronos-bot.com/el","dateModified":"2026-04-23","publisher":{"@type":"Organization","name":"Chronos","url":"https://chronos-bot.com","logo":{"@type":"ImageObject","url":"https://chronos-bot.com/favicon.png"}},"mainEntity":[{"@type":"Question","@id":"https://chronos-bot.com/el#faq-el-q1","name":"What is Chronos?","acceptedAnswer":{"@type":"Answer","text":"Chronos is a Windows desktop application that converts entire folder structures into text files optimized for AI assistants like ChatGPT, Claude, and Copilot. Instead of manually copying files one by one, you can export your entire project context in seconds.","inLanguage":"en"}},{"@type":"Question","@id":"https://chronos-bot.com/el#faq-el-q2","name":"How do I purchase and download?","acceptedAnswer":{"@type":"Answer","text":"All purchases are made through the Microsoft Store. Click \"Download from Microsoft Store\" to access the app page. Payment and license management are handled entirely by Microsoft, ensuring a secure and familiar purchasing experience.","inLanguage":"en"}},{"@type":"Question","@id":"https://chronos-bot.com/el#faq-el-q3","name":"What's the difference between Standard and Pro?","acceptedAnswer":{"@type":"Answer","text":"The Standard license (€14.99 one-time) includes: unlimited extractions up to 500 files per extraction, lifetime license, Windows context menu, multi-thread processing, desktop notifications. Pro (€6.99/mo or €47.88/yr) adds: no file count limits per extraction, advanced extension/directory management, configurable auto-split, saveable custom presets, and advanced templates.","inLanguage":"en"}},{"@type":"Question","@id":"https://chronos-bot.com/el#faq-el-q4","name":"Can I get a refund?","acceptedAnswer":{"@type":"Answer","text":"Refunds are handled according to Microsoft Store policies and applicable consumer protection laws. We do not provide direct refunds as all transactions go through Microsoft. If you experience issues, please contact Microsoft Store support.","inLanguage":"en"}},{"@type":"Question","@id":"https://chronos-bot.com/el#faq-el-q5","name":"Is there a free trial?","acceptedAnswer":{"@type":"Answer","text":"Yes! You get 3 free trials to try Chronos before purchasing. The Standard license is a one-time purchase with no recurring fees.","inLanguage":"en"}},{"@type":"Question","@id":"https://chronos-bot.com/el#faq-el-q6","name":"Does my data leave my computer?","acceptedAnswer":{"@type":"Answer","text":"No. Chronos runs 100% locally on your machine. Your code files are never uploaded, transmitted, or processed on any external server. The output text file is created locally and you control where it goes.","inLanguage":"en"}},{"@type":"Question","@id":"https://chronos-bot.com/el#faq-el-q7","name":"Will I get future updates?","acceptedAnswer":{"@type":"Answer","text":"Yes! Standard license holders receive all standard feature updates forever. Pro subscribers get access to all Pro features as they launch. Updates are delivered automatically through the Microsoft Store.","inLanguage":"en"}}],"datePublished":"2026-02-01","isPartOf":{"@type":"WebSite","@id":"https://chronos-bot.com/#website","name":"Chronos","url":"https://chronos-bot.com/"},"about":{"@type":"WebApplication","@id":"https://chronos-bot.com/#webapp","name":"Chronos","applicationCategory":"DeveloperApplication","operatingSystem":"Windows, Web"},"author":{"@type":"Organization","name":"Chronos","url":"https://chronos-bot.com/"},"speakable":{"@type":"SpeakableSpecification","cssSelector":["#faq h3[data-faq-question]","#faq [data-faq-answer]","#faq"]}}</script>
    <script type="application/ld+json" data-faq-lang="ro">{"@context":"https://schema.org","@type":"FAQPage","@id":"https://chronos-bot.com/ro#faq-ro","inLanguage":"ro","url":"https://chronos-bot.com/ro","dateModified":"2026-04-23","publisher":{"@type":"Organization","name":"Chronos","url":"https://chronos-bot.com","logo":{"@type":"ImageObject","url":"https://chronos-bot.com/favicon.png"}},"mainEntity":[{"@type":"Question","@id":"https://chronos-bot.com/ro#faq-ro-q1","name":"Ce este Chronos?","acceptedAnswer":{"@type":"Answer","text":"Chronos este o aplicație desktop Windows care convertește structuri întregi de foldere în fișiere text optimizate pentru asistenți AI precum ChatGPT, Claude și Copilot. În loc să copiezi manual fișierele unul câte unul, poți exporta întregul context al proiectului în secunde.","inLanguage":"ro"}},{"@type":"Question","@id":"https://chronos-bot.com/ro#faq-ro-q2","name":"Cum cumpăr și descarc?","acceptedAnswer":{"@type":"Answer","text":"Toate achizițiile se fac prin Microsoft Store. Apasă pe \"Descarcă din Microsoft Store\" pentru a vizita pagina aplicației. Plata și gestionarea licenței sunt complet gestionate de Microsoft.","inLanguage":"ro"}},{"@type":"Question","@id":"https://chronos-bot.com/ro#faq-ro-q3","name":"Care este diferența între Standard și Pro?","acceptedAnswer":{"@type":"Answer","text":"Licența Standard (€14,99 o singură dată) include: extracții nelimitate până la 500 fișiere, licență pe viață, meniu contextual Windows, multi-thread, notificări desktop. Pro (€6,99/lună sau €47,88/an) adaugă: fără limită de fișiere, gestionare avansată extensii/directoare, auto-split configurabil, șabloane salvabile și șabloane avansate.","inLanguage":"ro"}},{"@type":"Question","@id":"https://chronos-bot.com/ro#faq-ro-q4","name":"Pot obține o rambursare?","acceptedAnswer":{"@type":"Answer","text":"Rambursările sunt gestionate conform politicilor Microsoft Store și legislației aplicabile privind protecția consumatorilor. Nu oferim rambursări directe deoarece toate tranzacțiile trec prin Microsoft.","inLanguage":"ro"}},{"@type":"Question","@id":"https://chronos-bot.com/ro#faq-ro-q5","name":"Există o versiune de probă gratuită?","acceptedAnswer":{"@type":"Answer","text":"Da! Primești 3 încercări gratuite pentru a testa Chronos înainte de a cumpăra. Licența Standard este o achiziție unică fără costuri recurente.","inLanguage":"ro"}},{"@type":"Question","@id":"https://chronos-bot.com/ro#faq-ro-q6","name":"Datele mele părăsesc computerul?","acceptedAnswer":{"@type":"Answer","text":"Nu. Chronos rulează 100% local pe computerul tău. Fișierele tale de cod nu sunt niciodată încărcate, transmise sau procesate pe servere externe.","inLanguage":"ro"}},{"@type":"Question","@id":"https://chronos-bot.com/ro#faq-ro-q7","name":"Voi primi actualizări viitoare?","acceptedAnswer":{"@type":"Answer","text":"Da! Deținătorii licenței Standard primesc toate actualizările Standard pentru totdeauna. Abonații Pro au acces la toate funcționalitățile Pro la lansare. Actualizările sunt livrate automat prin Microsoft Store.","inLanguage":"ro"}}],"datePublished":"2026-02-01","isPartOf":{"@type":"WebSite","@id":"https://chronos-bot.com/#website","name":"Chronos","url":"https://chronos-bot.com/"},"about":{"@type":"WebApplication","@id":"https://chronos-bot.com/#webapp","name":"Chronos","applicationCategory":"DeveloperApplication","operatingSystem":"Windows, Web"},"author":{"@type":"Organization","name":"Chronos","url":"https://chronos-bot.com/"},"speakable":{"@type":"SpeakableSpecification","cssSelector":["#faq h3[data-faq-question]","#faq [data-faq-answer]","#faq"]}}</script>
    <script type="application/ld+json" data-faq-lang="hu">{"@context":"https://schema.org","@type":"FAQPage","@id":"https://chronos-bot.com/hu#faq-hu","inLanguage":"hu","url":"https://chronos-bot.com/hu","dateModified":"2026-04-23","publisher":{"@type":"Organization","name":"Chronos","url":"https://chronos-bot.com","logo":{"@type":"ImageObject","url":"https://chronos-bot.com/favicon.png"}},"mainEntity":[{"@type":"Question","@id":"https://chronos-bot.com/hu#faq-hu-q1","name":"Mi az a Chronos?","acceptedAnswer":{"@type":"Answer","text":"A Chronos egy Windows asztali alkalmazás, amely teljes mappastruktúrákat alakít szöveges fájlokká, amelyek AI asszisztensekhez vannak optimalizálva, mint a ChatGPT, Claude és Copilot. A fájlok egyenkénti másolása helyett másodpercek alatt exportálhatod a teljes projektkontextust.","inLanguage":"hu"}},{"@type":"Question","@id":"https://chronos-bot.com/hu#faq-hu-q2","name":"Hogyan vásárolok és töltök le?","acceptedAnswer":{"@type":"Answer","text":"Minden vásárlás a Microsoft Store-on keresztül történik. Kattints a \"Letöltés a Microsoft Store-ból\" gombra az alkalmazás oldalának meglátogatásához. A fizetést és licenckezelést teljes mértékben a Microsoft végzi.","inLanguage":"hu"}},{"@type":"Question","@id":"https://chronos-bot.com/hu#faq-hu-q3","name":"Mi a különbség a Standard és a Pro között?","acceptedAnswer":{"@type":"Answer","text":"A Standard licenc (€14,99 egyszeri) tartalmazza: korlátlan kinyerés max 500 fájlig, élethosszig tartó licenc, Windows kontextus menü, többszálú, asztali értesítések. A Pro (€6,99/hó vagy €47,88/év) hozzáadja: nincs fájlkorlát, fejlett kiterjesztés-/könyvtárkezelés, konfigurálható auto-split, menthető sablonok és fejlett előre elkészített sablonok.","inLanguage":"hu"}},{"@type":"Question","@id":"https://chronos-bot.com/hu#faq-hu-q4","name":"Kaphatok visszatérítést?","acceptedAnswer":{"@type":"Answer","text":"A visszatérítéseket a Microsoft Store szabályzata és az alkalmazandó fogyasztóvédelmi jogszabályok szerint kezelik. Nem kínálunk közvetlen visszatérítést, mivel minden tranzakció a Microsofton keresztül zajlik.","inLanguage":"hu"}},{"@type":"Question","@id":"https://chronos-bot.com/hu#faq-hu-q5","name":"Van ingyenes próbaverzió?","acceptedAnswer":{"@type":"Answer","text":"Igen! 3 ingyenes próbát kapsz a Chronos kipróbálásához vásárlás előtt. A Standard licenc egyszeri vásárlás, ismétlődő költségek nélkül.","inLanguage":"hu"}},{"@type":"Question","@id":"https://chronos-bot.com/hu#faq-hu-q6","name":"Az adataim elhagyják a számítógépemet?","acceptedAnswer":{"@type":"Answer","text":"Nem. A Chronos 100%-ban helyben fut a számítógépeden. A kódfájljaid soha nem kerülnek feltöltésre, továbbításra vagy külső szerveren történő feldolgozásra.","inLanguage":"hu"}},{"@type":"Question","@id":"https://chronos-bot.com/hu#faq-hu-q7","name":"Kapok jövőbeli frissítéseket?","acceptedAnswer":{"@type":"Answer","text":"Igen! A Standard licenc tulajdonosai örökre megkapják az összes Standard frissítést. A Pro előfizetők hozzáférést kapnak az összes Pro funkcióhoz megjelenéskor. A frissítések automatikusan a Microsoft Store-on keresztül érkeznek.","inLanguage":"hu"}}],"datePublished":"2026-02-01","isPartOf":{"@type":"WebSite","@id":"https://chronos-bot.com/#website","name":"Chronos","url":"https://chronos-bot.com/"},"about":{"@type":"WebApplication","@id":"https://chronos-bot.com/#webapp","name":"Chronos","applicationCategory":"DeveloperApplication","operatingSystem":"Windows, Web"},"author":{"@type":"Organization","name":"Chronos","url":"https://chronos-bot.com/"},"speakable":{"@type":"SpeakableSpecification","cssSelector":["#faq h3[data-faq-question]","#faq [data-faq-answer]","#faq"]}}</script>
    <script type="application/ld+json" data-faq-lang="bg">{"@context":"https://schema.org","@type":"FAQPage","@id":"https://chronos-bot.com/bg#faq-bg","inLanguage":"bg","url":"https://chronos-bot.com/bg","dateModified":"2026-04-23","publisher":{"@type":"Organization","name":"Chronos","url":"https://chronos-bot.com","logo":{"@type":"ImageObject","url":"https://chronos-bot.com/favicon.png"}},"mainEntity":[{"@type":"Question","@id":"https://chronos-bot.com/bg#faq-bg-q1","name":"Какво е Chronos?","acceptedAnswer":{"@type":"Answer","text":"Chronos е десктоп приложение за Windows, което конвертира цели структури от папки в текстови файлове, оптимизирани за AI асистенти като ChatGPT, Claude и Copilot. Вместо ръчно копиране на файлове един по един, можете да експортирате целия контекст на проекта за секунди.","inLanguage":"bg"}},{"@type":"Question","@id":"https://chronos-bot.com/bg#faq-bg-q2","name":"Как да купя и изтегля?","acceptedAnswer":{"@type":"Answer","text":"Всички покупки се извършват чрез Microsoft Store. Кликнете \"Изтеглете от Microsoft Store\", за да посетите страницата на приложението. Плащането и управлението на лиценза се извършват изцяло от Microsoft.","inLanguage":"bg"}},{"@type":"Question","@id":"https://chronos-bot.com/bg#faq-bg-q3","name":"Каква е разликата между Standard и Pro?","acceptedAnswer":{"@type":"Answer","text":"Стандартният лиценз (€14,99 еднократно) включва: неограничени извличания до 500 файла, доживотен лиценз, контекстно меню на Windows, многонишково, известия. Pro (€6,99/месец или €47,88/година) добавя: без лимит на файлове, разширено управление на разширения/директории, конфигурируемо авто-разделяне, записваеми шаблони и разширени готови шаблони.","inLanguage":"bg"}},{"@type":"Question","@id":"https://chronos-bot.com/bg#faq-bg-q4","name":"Мога ли да получа възстановяване?","acceptedAnswer":{"@type":"Answer","text":"Възстановяванията се обработват съгласно политиките на Microsoft Store и приложимото законодателство за защита на потребителите. Не предлагаме директни възстановявания, тъй като всички транзакции минават през Microsoft.","inLanguage":"bg"}},{"@type":"Question","@id":"https://chronos-bot.com/bg#faq-bg-q5","name":"Има ли безплатна пробна версия?","acceptedAnswer":{"@type":"Answer","text":"Да! Получавате 3 безплатни пробни опита, за да изпробвате Chronos преди покупка. Стандартният лиценз е еднократна покупка без повтарящи се разходи.","inLanguage":"bg"}},{"@type":"Question","@id":"https://chronos-bot.com/bg#faq-bg-q6","name":"Данните ми напускат ли компютъра?","acceptedAnswer":{"@type":"Answer","text":"Не. Chronos работи 100% локално на вашия компютър. Вашите кодови файлове никога не се качват, предават или обработват на външни сървъри.","inLanguage":"bg"}},{"@type":"Question","@id":"https://chronos-bot.com/bg#faq-bg-q7","name":"Ще получа ли бъдещи актуализации?","acceptedAnswer":{"@type":"Answer","text":"Да! Притежателите на Стандартен лиценз получават всички Стандартни актуализации завинаги. Pro абонатите получават достъп до всички Pro функции при издаване. Актуализациите се доставят автоматично чрез Microsoft Store.","inLanguage":"bg"}}],"datePublished":"2026-02-01","isPartOf":{"@type":"WebSite","@id":"https://chronos-bot.com/#website","name":"Chronos","url":"https://chronos-bot.com/"},"about":{"@type":"WebApplication","@id":"https://chronos-bot.com/#webapp","name":"Chronos","applicationCategory":"DeveloperApplication","operatingSystem":"Windows, Web"},"author":{"@type":"Organization","name":"Chronos","url":"https://chronos-bot.com/"},"speakable":{"@type":"SpeakableSpecification","cssSelector":["#faq h3[data-faq-question]","#faq [data-faq-answer]","#faq"]}}</script>
    <script type="application/ld+json" data-faq-lang="hr">{"@context":"https://schema.org","@type":"FAQPage","@id":"https://chronos-bot.com/hr#faq-hr","inLanguage":"hr","url":"https://chronos-bot.com/hr","dateModified":"2026-04-23","publisher":{"@type":"Organization","name":"Chronos","url":"https://chronos-bot.com","logo":{"@type":"ImageObject","url":"https://chronos-bot.com/favicon.png"}},"mainEntity":[{"@type":"Question","@id":"https://chronos-bot.com/hr#faq-hr-q1","name":"Što je Chronos?","acceptedAnswer":{"@type":"Answer","text":"Chronos je Windows desktop aplikacija koja pretvara cijele strukture mapa u tekstualne datoteke optimizirane za AI asistente poput ChatGPT, Claude i Copilot. Umjesto ručnog kopiranja datoteka jednu po jednu, možete izvesti cijeli kontekst projekta u sekundama.","inLanguage":"hr"}},{"@type":"Question","@id":"https://chronos-bot.com/hr#faq-hr-q2","name":"Kako kupiti i preuzeti?","acceptedAnswer":{"@type":"Answer","text":"Sve kupnje se vrše putem Microsoft Storea. Kliknite \"Preuzmi iz Microsoft Storea\" za posjet stranici aplikacije. Plaćanje i upravljanje licencom u potpunosti obavlja Microsoft.","inLanguage":"hr"}},{"@type":"Question","@id":"https://chronos-bot.com/hr#faq-hr-q3","name":"Koja je razlika između Standard i Pro?","acceptedAnswer":{"@type":"Answer","text":"Standardna licenca (€14,99 jednokratno) uključuje: neograničene ekstrakcije do 500 datoteka, doživotnu licencu, Windows kontekstni izbornik, višenitno, obavijesti. Pro (€6,99/mjesec ili €47,88/godinu) dodaje: bez ograničenja datoteka, napredno upravljanje ekstenzijama/direktorijima, konfigurirajuće automatsko dijeljenje, spremljive predloške i napredne gotove predloške.","inLanguage":"hr"}},{"@type":"Question","@id":"https://chronos-bot.com/hr#faq-hr-q4","name":"Mogu li dobiti povrat?","acceptedAnswer":{"@type":"Answer","text":"Povrati se obrađuju prema pravilima Microsoft Storea i primjenjivim zakonima o zaštiti potrošača. Ne nudimo izravne povrate jer sve transakcije prolaze kroz Microsoft.","inLanguage":"hr"}},{"@type":"Question","@id":"https://chronos-bot.com/hr#faq-hr-q5","name":"Postoji li besplatna probna verzija?","acceptedAnswer":{"@type":"Answer","text":"Da! Dobivate 3 besplatna probna pokušaja za isprobavanje Chronosa prije kupnje. Standardna licenca je jednokratna kupnja bez ponavljajućih troškova.","inLanguage":"hr"}},{"@type":"Question","@id":"https://chronos-bot.com/hr#faq-hr-q6","name":"Napuštaju li moji podaci moje računalo?","acceptedAnswer":{"@type":"Answer","text":"Ne. Chronos radi 100% lokalno na vašem računalu. Vaše datoteke koda nikad se ne učitavaju, prenose niti obrađuju na vanjskim poslužiteljima.","inLanguage":"hr"}},{"@type":"Question","@id":"https://chronos-bot.com/hr#faq-hr-q7","name":"Hoću li dobiti buduća ažuriranja?","acceptedAnswer":{"@type":"Answer","text":"Da! Vlasnici Standardne licence dobivaju sva Standardna ažuriranja zauvijek. Pro pretplatnici dobivaju pristup svim Pro značajkama po izdanju. Ažuriranja se isporučuju automatski putem Microsoft Storea.","inLanguage":"hr"}}],"datePublished":"2026-02-01","isPartOf":{"@type":"WebSite","@id":"https://chronos-bot.com/#website","name":"Chronos","url":"https://chronos-bot.com/"},"about":{"@type":"WebApplication","@id":"https://chronos-bot.com/#webapp","name":"Chronos","applicationCategory":"DeveloperApplication","operatingSystem":"Windows, Web"},"author":{"@type":"Organization","name":"Chronos","url":"https://chronos-bot.com/"},"speakable":{"@type":"SpeakableSpecification","cssSelector":["#faq h3[data-faq-question]","#faq [data-faq-answer]","#faq"]}}</script>
    <script type="application/ld+json" data-faq-lang="sk">{"@context":"https://schema.org","@type":"FAQPage","@id":"https://chronos-bot.com/sk#faq-sk","inLanguage":"sk","url":"https://chronos-bot.com/sk","dateModified":"2026-04-23","publisher":{"@type":"Organization","name":"Chronos","url":"https://chronos-bot.com","logo":{"@type":"ImageObject","url":"https://chronos-bot.com/favicon.png"}},"mainEntity":[{"@type":"Question","@id":"https://chronos-bot.com/sk#faq-sk-q1","name":"Čo je Chronos?","acceptedAnswer":{"@type":"Answer","text":"Chronos je desktopová aplikácia pre Windows, ktorá konvertuje celé štruktúry priečinkov na textové súbory optimalizované pre AI asistentov ako ChatGPT, Claude a Copilot. Namiesto manuálneho kopírovania súborov jedného po druhom môžete exportovať celý kontext projektu za sekundy.","inLanguage":"sk"}},{"@type":"Question","@id":"https://chronos-bot.com/sk#faq-sk-q2","name":"Ako kúpiť a stiahnuť?","acceptedAnswer":{"@type":"Answer","text":"Všetky nákupy sa uskutočňujú cez Microsoft Store. Kliknite na \"Stiahnuť z Microsoft Store\" pre návštevu stránky aplikácie. Platba a správa licencií je kompletne zabezpečená spoločnosťou Microsoft.","inLanguage":"sk"}},{"@type":"Question","@id":"https://chronos-bot.com/sk#faq-sk-q3","name":"Aký je rozdiel medzi Standard a Pro?","acceptedAnswer":{"@type":"Answer","text":"Štandardná licencia (€14,99 jednorazovo) zahŕňa: neobmedzené extrakcie max 500 súborov, doživotnú licenciu, kontextovú ponuku Windows, viacvláknové, upozornenia. Pro (€6,99/mesiac alebo €47,88/rok) pridáva: bez limitu súborov, pokročilú správu prípon/adresárov, konfigurovateľné auto-rozdelenie, uložiteľné šablóny a pokročilé predpripravené šablóny.","inLanguage":"sk"}},{"@type":"Question","@id":"https://chronos-bot.com/sk#faq-sk-q4","name":"Môžem získať vrátenie peňazí?","acceptedAnswer":{"@type":"Answer","text":"Vrátenie peňazí sa rieši podľa zásad Microsoft Store a platných zákonov na ochranu spotrebiteľa. Neposkytujeme priame vrátenie peňazí, pretože všetky transakcie prebiehajú cez Microsoft.","inLanguage":"sk"}},{"@type":"Question","@id":"https://chronos-bot.com/sk#faq-sk-q5","name":"Existuje bezplatná skúšobná verzia?","acceptedAnswer":{"@type":"Answer","text":"Áno! Získate 3 bezplatné skúšobné pokusy na vyskúšanie Chronos pred kúpou. Štandardná licencia je jednorazový nákup bez opakujúcich sa nákladov.","inLanguage":"sk"}},{"@type":"Question","@id":"https://chronos-bot.com/sk#faq-sk-q6","name":"Opúšťajú moje dáta môj počítač?","acceptedAnswer":{"@type":"Answer","text":"Nie. Chronos beží 100% lokálne na vašom počítači. Vaše kódové súbory sa nikdy neodovzdávajú, neprenášajú ani nespracúvajú na externých serveroch.","inLanguage":"sk"}},{"@type":"Question","@id":"https://chronos-bot.com/sk#faq-sk-q7","name":"Dostanem budúce aktualizácie?","acceptedAnswer":{"@type":"Answer","text":"Áno! Vlastníci Štandardnej licencie dostávajú všetky Štandardné aktualizácie navždy. Pro predplatitelia získajú prístup ku všetkým Pro funkciám pri vydaní. Aktualizácie sa dodávajú automaticky cez Microsoft Store.","inLanguage":"sk"}}],"datePublished":"2026-02-01","isPartOf":{"@type":"WebSite","@id":"https://chronos-bot.com/#website","name":"Chronos","url":"https://chronos-bot.com/"},"about":{"@type":"WebApplication","@id":"https://chronos-bot.com/#webapp","name":"Chronos","applicationCategory":"DeveloperApplication","operatingSystem":"Windows, Web"},"author":{"@type":"Organization","name":"Chronos","url":"https://chronos-bot.com/"},"speakable":{"@type":"SpeakableSpecification","cssSelector":["#faq h3[data-faq-question]","#faq [data-faq-answer]","#faq"]}}</script>
    <script type="application/ld+json" data-faq-lang="sr">{"@context":"https://schema.org","@type":"FAQPage","@id":"https://chronos-bot.com/sr#faq-sr","inLanguage":"sr","url":"https://chronos-bot.com/sr","dateModified":"2026-04-23","publisher":{"@type":"Organization","name":"Chronos","url":"https://chronos-bot.com","logo":{"@type":"ImageObject","url":"https://chronos-bot.com/favicon.png"}},"mainEntity":[{"@type":"Question","@id":"https://chronos-bot.com/sr#faq-sr-q1","name":"Шта је Chronos?","acceptedAnswer":{"@type":"Answer","text":"Chronos је Windows десктоп апликација која конвертује целе структуре фолдера у текстуалне фајлове оптимизоване за AI асистенте попут ChatGPT, Claude и Copilot. Уместо ручног копирања датотека једну по једну, можете извести цео контекст пројекта за секунде.","inLanguage":"sr"}},{"@type":"Question","@id":"https://chronos-bot.com/sr#faq-sr-q2","name":"Како купити и преузети?","acceptedAnswer":{"@type":"Answer","text":"Све куповине се врше путем Microsoft Store-а. Кликните \"Преузмите из Microsoft Store-а\" за посету страници апликације. Плаћање и управљање лиценцом у потпуности обавља Microsoft.","inLanguage":"sr"}},{"@type":"Question","@id":"https://chronos-bot.com/sr#faq-sr-q3","name":"Која је разлика између Standard и Pro?","acceptedAnswer":{"@type":"Answer","text":"Стандардна лиценца (€14,99 једнократно) укључује: неограничене екстракције до 500 датотека, доживотну лиценцу, Windows контекстни мени, вишенитно, обавештења. Pro (€6,99/месец или €47,88/годину) додаје: без ограничења датотека, напредно управљање екстензијама/директоријумима, конфигурабилно ауто-дељење, сачувљиве предлошке и напредне готове предлошке.","inLanguage":"sr"}},{"@type":"Question","@id":"https://chronos-bot.com/sr#faq-sr-q4","name":"Могу ли добити повраћај?","acceptedAnswer":{"@type":"Answer","text":"Повраћаји се обрађују према правилима Microsoft Store-а и примењивим законима о заштити потрошача. Не нудимо директне повраћаје јер све трансакције пролазе кроз Microsoft.","inLanguage":"sr"}},{"@type":"Question","@id":"https://chronos-bot.com/sr#faq-sr-q5","name":"Постоји ли бесплатна пробна верзија?","acceptedAnswer":{"@type":"Answer","text":"Да! Добијате 3 бесплатна пробна покушаја за испробавање Chronos-а пре куповине. Стандардна лиценца је једнократна куповина без понављајућих трошкова.","inLanguage":"sr"}},{"@type":"Question","@id":"https://chronos-bot.com/sr#faq-sr-q6","name":"Напуштају ли моји подаци мој рачунар?","acceptedAnswer":{"@type":"Answer","text":"Не. Chronos ради 100% локално на вашем рачунару. Ваши фајлови кода никад се не учитавају, преносе нити обрађују на спољним серверима.","inLanguage":"sr"}},{"@type":"Question","@id":"https://chronos-bot.com/sr#faq-sr-q7","name":"Хоћу ли добити будућа ажурирања?","acceptedAnswer":{"@type":"Answer","text":"Да! Власници Стандардне лиценце добијају сва Стандардна ажурирања заувек. Pro претплатници добијају приступ свим Pro функцијама по издању. Ажурирања се испоручују аутоматски путем Microsoft Store-а.","inLanguage":"sr"}}],"datePublished":"2026-02-01","isPartOf":{"@type":"WebSite","@id":"https://chronos-bot.com/#website","name":"Chronos","url":"https://chronos-bot.com/"},"about":{"@type":"WebApplication","@id":"https://chronos-bot.com/#webapp","name":"Chronos","applicationCategory":"DeveloperApplication","operatingSystem":"Windows, Web"},"author":{"@type":"Organization","name":"Chronos","url":"https://chronos-bot.com/"},"speakable":{"@type":"SpeakableSpecification","cssSelector":["#faq h3[data-faq-question]","#faq [data-faq-answer]","#faq"]}}</script>
    <script type="application/ld+json" data-faq-lang="lt">{"@context":"https://schema.org","@type":"FAQPage","@id":"https://chronos-bot.com/lt#faq-lt","inLanguage":"lt","url":"https://chronos-bot.com/lt","dateModified":"2026-04-23","publisher":{"@type":"Organization","name":"Chronos","url":"https://chronos-bot.com","logo":{"@type":"ImageObject","url":"https://chronos-bot.com/favicon.png"}},"mainEntity":[{"@type":"Question","@id":"https://chronos-bot.com/lt#faq-lt-q1","name":"Kas yra Chronos?","acceptedAnswer":{"@type":"Answer","text":"Chronos yra Windows darbalaukio programa, kuri konvertuoja ištisas aplankų struktūras į tekstinius failus, optimizuotus AI asistentams, tokiems kaip ChatGPT, Claude ir Copilot. Užuot rankiniu būdu kopijavus failus po vieną, galite eksportuoti visą projekto kontekstą per sekundes.","inLanguage":"lt"}},{"@type":"Question","@id":"https://chronos-bot.com/lt#faq-lt-q2","name":"Kaip nusipirkti ir atsisiųsti?","acceptedAnswer":{"@type":"Answer","text":"Visi pirkimai vykdomi per Microsoft Store. Spustelėkite \"Atsisiųsti iš Microsoft Store\", kad aplankytumėte programos puslapį. Mokėjimą ir licencijų valdymą visiškai tvarko Microsoft.","inLanguage":"lt"}},{"@type":"Question","@id":"https://chronos-bot.com/lt#faq-lt-q3","name":"Koks skirtumas tarp Standard ir Pro?","acceptedAnswer":{"@type":"Answer","text":"Standartinė licencija (€14,99 vienkartinė) apima: neribotas ištraukas iki 500 failų, amžiną licenciją, Windows kontekstinį meniu, daugiagijį, pranešimus. Pro (€6,99/mėn. arba €47,88/metus) prideda: be failų limito, pažangų plėtinių/katalogų valdymą, konfigūruojamą automatinį dalijimą, išsaugomus šablonus ir pažangius paruoštus šablonus.","inLanguage":"lt"}},{"@type":"Question","@id":"https://chronos-bot.com/lt#faq-lt-q4","name":"Ar galiu gauti grąžinimą?","acceptedAnswer":{"@type":"Answer","text":"Grąžinimai tvarkomi pagal Microsoft Store politiką ir galiojančius vartotojų apsaugos įstatymus. Mes neteikiame tiesioginių grąžinimų, nes visos operacijos vyksta per Microsoft.","inLanguage":"lt"}},{"@type":"Question","@id":"https://chronos-bot.com/lt#faq-lt-q5","name":"Ar yra nemokama bandomoji versija?","acceptedAnswer":{"@type":"Answer","text":"Taip! Gausite 3 nemokamus bandymus Chronos išbandyti prieš perkant. Standartinė licencija yra vienkartinis pirkimas be pasikartojančių išlaidų.","inLanguage":"lt"}},{"@type":"Question","@id":"https://chronos-bot.com/lt#faq-lt-q6","name":"Ar mano duomenys palieka kompiuterį?","acceptedAnswer":{"@type":"Answer","text":"Ne. Chronos veikia 100% lokaliai jūsų kompiuteryje. Jūsų kodo failai niekada neįkeliami, neperduodami ir neapdorojami išoriniuose serveriuose.","inLanguage":"lt"}},{"@type":"Question","@id":"https://chronos-bot.com/lt#faq-lt-q7","name":"Ar gausiu ateities atnaujinimus?","acceptedAnswer":{"@type":"Answer","text":"Taip! Standartinės licencijos turėtojai gauna visus Standartinius atnaujinimus amžinai. Pro prenumeratoriai gauna prieigą prie visų Pro funkcijų paskelbus. Atnaujinimai pristatomi automatiškai per Microsoft Store.","inLanguage":"lt"}}],"datePublished":"2026-02-01","isPartOf":{"@type":"WebSite","@id":"https://chronos-bot.com/#website","name":"Chronos","url":"https://chronos-bot.com/"},"about":{"@type":"WebApplication","@id":"https://chronos-bot.com/#webapp","name":"Chronos","applicationCategory":"DeveloperApplication","operatingSystem":"Windows, Web"},"author":{"@type":"Organization","name":"Chronos","url":"https://chronos-bot.com/"},"speakable":{"@type":"SpeakableSpecification","cssSelector":["#faq h3[data-faq-question]","#faq [data-faq-answer]","#faq"]}}</script>
    <script type="application/ld+json" data-faq-lang="lv">{"@context":"https://schema.org","@type":"FAQPage","@id":"https://chronos-bot.com/lv#faq-lv","inLanguage":"lv","url":"https://chronos-bot.com/lv","dateModified":"2026-04-23","publisher":{"@type":"Organization","name":"Chronos","url":"https://chronos-bot.com","logo":{"@type":"ImageObject","url":"https://chronos-bot.com/favicon.png"}},"mainEntity":[{"@type":"Question","@id":"https://chronos-bot.com/lv#faq-lv-q1","name":"Kas ir Chronos?","acceptedAnswer":{"@type":"Answer","text":"Chronos ir Windows darbvirsmas lietojumprogramma, kas pārveido veselas mapju struktūras teksta failos, kas optimizēti AI palīgiem kā ChatGPT, Claude un Copilot. Tā vietā, lai manuāli kopētu failus pa vienam, varat eksportēt visu projekta kontekstu sekundēs.","inLanguage":"lv"}},{"@type":"Question","@id":"https://chronos-bot.com/lv#faq-lv-q2","name":"Kā iegādāties un lejupielādēt?","acceptedAnswer":{"@type":"Answer","text":"Visi pirkumi notiek caur Microsoft Store. Noklikšķiniet \"Lejupielādēt no Microsoft Store\", lai apmeklētu lietojumprogrammas lapu. Maksājumu un licenču pārvaldību pilnībā veic Microsoft.","inLanguage":"lv"}},{"@type":"Question","@id":"https://chronos-bot.com/lv#faq-lv-q3","name":"Kāda ir atšķirība starp Standard un Pro?","acceptedAnswer":{"@type":"Answer","text":"Standarta licence (€14,99 vienreizēji) ietver: neierobežotas izvilkšanas līdz 500 failiem, mūža licenci, Windows konteksta izvēlni, daudzpavedienu, paziņojumus. Pro (€6,99/mēn. vai €47,88/gadā) pievieno: bez failu limita, uzlabotu paplašinājumu/direktoriju pārvaldību, konfigurējamu auto-sadalīšanu, saglabājamas veidnes un uzlabotas gatavās veidnes.","inLanguage":"lv"}},{"@type":"Question","@id":"https://chronos-bot.com/lv#faq-lv-q4","name":"Vai varu saņemt atmaksu?","acceptedAnswer":{"@type":"Answer","text":"Atmaksas tiek apstrādātas saskaņā ar Microsoft Store politiku un piemērojamiem patērētāju aizsardzības likumiem. Mēs nepiedāvājam tiešas atmaksas, jo visi darījumi notiek caur Microsoft.","inLanguage":"lv"}},{"@type":"Question","@id":"https://chronos-bot.com/lv#faq-lv-q5","name":"Vai ir bezmaksas izmēģinājuma versija?","acceptedAnswer":{"@type":"Answer","text":"Jā! Jūs saņemat 3 bezmaksas izmēģinājuma mēģinājumus, lai izmēģinātu Chronos pirms iegādes. Standarta licence ir vienreizējs pirkums bez atkārtotām izmaksām.","inLanguage":"lv"}},{"@type":"Question","@id":"https://chronos-bot.com/lv#faq-lv-q6","name":"Vai mani dati atstāj manu datoru?","acceptedAnswer":{"@type":"Answer","text":"Nē. Chronos darbojas 100% lokāli jūsu datorā. Jūsu koda faili nekad netiek augšupielādēti, pārsūtīti vai apstrādāti ārējos serveros.","inLanguage":"lv"}},{"@type":"Question","@id":"https://chronos-bot.com/lv#faq-lv-q7","name":"Vai es saņemšu nākotnes atjauninājumus?","acceptedAnswer":{"@type":"Answer","text":"Jā! Standarta licences īpašnieki saņem visus Standarta atjauninājumus uz visiem laikiem. Pro abonenti saņem piekļuvi visām Pro funkcijām, kad tās tiek izlaistas. Atjauninājumi tiek piegādāti automātiski caur Microsoft Store.","inLanguage":"lv"}}],"datePublished":"2026-02-01","isPartOf":{"@type":"WebSite","@id":"https://chronos-bot.com/#website","name":"Chronos","url":"https://chronos-bot.com/"},"about":{"@type":"WebApplication","@id":"https://chronos-bot.com/#webapp","name":"Chronos","applicationCategory":"DeveloperApplication","operatingSystem":"Windows, Web"},"author":{"@type":"Organization","name":"Chronos","url":"https://chronos-bot.com/"},"speakable":{"@type":"SpeakableSpecification","cssSelector":["#faq h3[data-faq-question]","#faq [data-faq-answer]","#faq"]}}</script>
    <script type="application/ld+json" data-faq-lang="et">{"@context":"https://schema.org","@type":"FAQPage","@id":"https://chronos-bot.com/et#faq-et","inLanguage":"et","url":"https://chronos-bot.com/et","dateModified":"2026-04-23","publisher":{"@type":"Organization","name":"Chronos","url":"https://chronos-bot.com","logo":{"@type":"ImageObject","url":"https://chronos-bot.com/favicon.png"}},"mainEntity":[{"@type":"Question","@id":"https://chronos-bot.com/et#faq-et-q1","name":"Mis on Chronos?","acceptedAnswer":{"@type":"Answer","text":"Chronos on Windowsi töölauarakendus, mis teisendab terved kaustastruktuurid tekstifailideks, mis on optimeeritud AI assistentide jaoks nagu ChatGPT, Claude ja Copilot. Selle asemel, et käsitsi faile ükshaaval kopeerida, saad eksportida kogu projektikonteksti sekunditega.","inLanguage":"et"}},{"@type":"Question","@id":"https://chronos-bot.com/et#faq-et-q2","name":"Kuidas osta ja alla laadida?","acceptedAnswer":{"@type":"Answer","text":"Kõik ostud toimuvad Microsoft Store'i kaudu. Klõpsa \"Laadi alla Microsoft Store'ist\", et külastada rakenduse lehte. Makse ja litsentsi haldamise teostab täielikult Microsoft.","inLanguage":"et"}},{"@type":"Question","@id":"https://chronos-bot.com/et#faq-et-q3","name":"Mis vahe on Standard ja Pro vahel?","acceptedAnswer":{"@type":"Answer","text":"Standardlitsents (€14,99 ühekordne) sisaldab: piiramatu arv ekstraheerimisi kuni 500 faili, eluaegne litsents, Windowsi kontekstimenüü, mitmelõimeline, teavitused. Pro (€6,99/kuu või €47,88/aasta) lisab: ilma failipiiranguta, täiustatud laiendite/kaustade haldamine, seadistatav automaatne jagamine, salvestatavad mallid ja täiustatud valmismallid.","inLanguage":"et"}},{"@type":"Question","@id":"https://chronos-bot.com/et#faq-et-q4","name":"Kas saan tagastust?","acceptedAnswer":{"@type":"Answer","text":"Tagastusi käsitletakse Microsoft Store'i reeglite ja kehtivate tarbijakaitseseaduste kohaselt. Me ei paku otseseid tagastusi, kuna kõik tehingud toimuvad Microsofti kaudu.","inLanguage":"et"}},{"@type":"Question","@id":"https://chronos-bot.com/et#faq-et-q5","name":"Kas on tasuta prooviversioon?","acceptedAnswer":{"@type":"Answer","text":"Jah! Saad 3 tasuta proovikatset Chronos'i proovimiseks enne ostmist. Standardlitsents on ühekordne ost ilma korduvate kuludeta.","inLanguage":"et"}},{"@type":"Question","@id":"https://chronos-bot.com/et#faq-et-q6","name":"Kas minu andmed lahkuvad minu arvutist?","acceptedAnswer":{"@type":"Answer","text":"Ei. Chronos töötab 100% kohapeal sinu arvutis. Sinu koodifailid ei lähe kunagi üles laadimisele, edastamisele ega väliste serverite töötlemisele.","inLanguage":"et"}},{"@type":"Question","@id":"https://chronos-bot.com/et#faq-et-q7","name":"Kas ma saan tulevasi värskendusi?","acceptedAnswer":{"@type":"Answer","text":"Jah! Standardlitsentsi omanikud saavad kõik Standardi värskendused igavesti. Pro tellijad saavad juurdepääsu kõigile Pro funktsioonidele avaldamisel. Värskendused tarnitakse automaatselt Microsoft Store'i kaudu.","inLanguage":"et"}}],"datePublished":"2026-02-01","isPartOf":{"@type":"WebSite","@id":"https://chronos-bot.com/#website","name":"Chronos","url":"https://chronos-bot.com/"},"about":{"@type":"WebApplication","@id":"https://chronos-bot.com/#webapp","name":"Chronos","applicationCategory":"DeveloperApplication","operatingSystem":"Windows, Web"},"author":{"@type":"Organization","name":"Chronos","url":"https://chronos-bot.com/"},"speakable":{"@type":"SpeakableSpecification","cssSelector":["#faq h3[data-faq-question]","#faq [data-faq-answer]","#faq"]}}</script>
    <script type="application/ld+json" data-faq-lang="sl">{"@context":"https://schema.org","@type":"FAQPage","@id":"https://chronos-bot.com/sl#faq-sl","inLanguage":"sl","url":"https://chronos-bot.com/sl","dateModified":"2026-04-23","publisher":{"@type":"Organization","name":"Chronos","url":"https://chronos-bot.com","logo":{"@type":"ImageObject","url":"https://chronos-bot.com/favicon.png"}},"mainEntity":[{"@type":"Question","@id":"https://chronos-bot.com/sl#faq-sl-q1","name":"Kaj je Chronos?","acceptedAnswer":{"@type":"Answer","text":"Chronos je namizna aplikacija za Windows, ki pretvarja celotne strukture map v besedilne datoteke, optimizirane za AI pomočnike, kot so ChatGPT, Claude in Copilot. Namesto ročnega kopiranja datotek ene za drugo lahko izvozite celoten kontekst projekta v sekundah.","inLanguage":"sl"}},{"@type":"Question","@id":"https://chronos-bot.com/sl#faq-sl-q2","name":"Kako kupiti in prenesti?","acceptedAnswer":{"@type":"Answer","text":"Vsi nakupi potekajo prek Microsoft Store. Kliknite \"Prenesi iz Microsoft Store\" za obisk strani aplikacije. Plačilo in upravljanje licenc v celoti opravlja Microsoft.","inLanguage":"sl"}},{"@type":"Question","@id":"https://chronos-bot.com/sl#faq-sl-q3","name":"Kakšna je razlika med Standard in Pro?","acceptedAnswer":{"@type":"Answer","text":"Standardna licenca (€14,99 enkratno) vključuje: neomejene ekstrakcije do 500 datotek, dosmrtno licenco, kontekstni meni Windows, večnitno, obvestila. Pro (€6,99/mesec ali €47,88/leto) dodaja: brez omejitve datotek, napredno upravljanje razširitev/imenikov, nastavljivo samodejno razdeljevanje, shranjive predloge in napredne pripravljene predloge.","inLanguage":"sl"}},{"@type":"Question","@id":"https://chronos-bot.com/sl#faq-sl-q4","name":"Ali lahko dobim vračilo?","acceptedAnswer":{"@type":"Answer","text":"Vračila se obravnavajo v skladu s pravili Microsoft Store in veljavno zakonodajo o varstvu potrošnikov. Ne ponujamo neposrednih vračil, saj vse transakcije potekajo prek Micros
