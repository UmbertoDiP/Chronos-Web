ofta.","inLanguage":"sl"}},{"@type":"Question","@id":"https://chronos-bot.com/sl#faq-sl-q5","name":"Ali obstaja brezplačna preizkusna različica?","acceptedAnswer":{"@type":"Answer","text":"Da! Dobite 3 brezplačne poskusne poizkuse za preizkus Chronos pred nakupom. Standardna licenca je enkratni nakup brez ponavljajočih se stroškov.","inLanguage":"sl"}},{"@type":"Question","@id":"https://chronos-bot.com/sl#faq-sl-q6","name":"Ali moji podatki zapustijo moj računalnik?","acceptedAnswer":{"@type":"Answer","text":"Ne. Chronos deluje 100% lokalno na vašem računalniku. Vaše kodne datoteke nikoli niso naložene, prenesene ali obdelane na zunanjih strežnikih.","inLanguage":"sl"}},{"@type":"Question","@id":"https://chronos-bot.com/sl#faq-sl-q7","name":"Ali bom prejel prihodnje posodobitve?","acceptedAnswer":{"@type":"Answer","text":"Da! Imetniki Standardne licence prejmejo vse Standardne posodobitve za vedno. Pro naročniki dobijo dostop do vseh Pro funkcij ob izdaji. Posodobitve se samodejno dostavljajo prek Microsoft Store.","inLanguage":"sl"}}],"datePublished":"2026-02-01","isPartOf":{"@type":"WebSite","@id":"https://chronos-bot.com/#website","name":"Chronos","url":"https://chronos-bot.com/"},"about":{"@type":"WebApplication","@id":"https://chronos-bot.com/#webapp","name":"Chronos","applicationCategory":"DeveloperApplication","operatingSystem":"Windows, Web"},"author":{"@type":"Organization","name":"Chronos","url":"https://chronos-bot.com/"},"speakable":{"@type":"SpeakableSpecification","cssSelector":["#faq h3[data-faq-question]","#faq [data-faq-answer]","#faq"]}}</script>
    <script type="application/ld+json" data-faq-lang="uk">{"@context":"https://schema.org","@type":"FAQPage","@id":"https://chronos-bot.com/uk#faq-uk","inLanguage":"uk","url":"https://chronos-bot.com/uk","dateModified":"2026-04-23","publisher":{"@type":"Organization","name":"Chronos","url":"https://chronos-bot.com","logo":{"@type":"ImageObject","url":"https://chronos-bot.com/favicon.png"}},"mainEntity":[{"@type":"Question","@id":"https://chronos-bot.com/uk#faq-uk-q1","name":"Що таке Chronos?","acceptedAnswer":{"@type":"Answer","text":"Chronos — це десктопний додаток для Windows, який конвертує цілі структури папок у текстові файли, оптимізовані для AI-асистентів, таких як ChatGPT, Claude та Copilot. Замість ручного копіювання файлів по одному, ви можете експортувати весь контекст проєкту за секунди.","inLanguage":"uk"}},{"@type":"Question","@id":"https://chronos-bot.com/uk#faq-uk-q2","name":"Як купити та завантажити?","acceptedAnswer":{"@type":"Answer","text":"Усі покупки здійснюються через Microsoft Store. Натисніть \"Завантажити з Microsoft Store\", щоб відвідати сторінку додатку. Оплата та керування ліцензією повністю здійснюються Microsoft.","inLanguage":"uk"}},{"@type":"Question","@id":"https://chronos-bot.com/uk#faq-uk-q3","name":"Яка різниця між Standard і Pro?","acceptedAnswer":{"@type":"Answer","text":"Стандартна ліцензія (€14,99 одноразово) включає: необмежені вилучення до 500 файлів, довічну ліцензію, контекстне меню Windows, багатопотоковість, сповіщення. Pro (€6,99/місяць або €47,88/рік) додає: без обмежень файлів, розширене керування розширеннями/каталогами, налаштовуваний авто-поділ, збережувані шаблони та розширені готові шаблони.","inLanguage":"uk"}},{"@type":"Question","@id":"https://chronos-bot.com/uk#faq-uk-q4","name":"Чи можу я отримати повернення?","acceptedAnswer":{"@type":"Answer","text":"Повернення обробляються відповідно до правил Microsoft Store та чинного законодавства про захист споживачів. Ми не пропонуємо прямих повернень, оскільки всі транзакції проходять через Microsoft.","inLanguage":"uk"}},{"@type":"Question","@id":"https://chronos-bot.com/uk#faq-uk-q5","name":"Чи є безкоштовна пробна версія?","acceptedAnswer":{"@type":"Answer","text":"Так! Ви отримуєте 3 безкоштовні пробні спроби, щоб випробувати Chronos перед покупкою. Стандартна ліцензія — це одноразова покупка без повторюваних витрат.","inLanguage":"uk"}},{"@type":"Question","@id":"https://chronos-bot.com/uk#faq-uk-q6","name":"Чи залишають мої дані мій комп'ютер?","acceptedAnswer":{"@type":"Answer","text":"Ні. Chronos працює на 100% локально на вашому комп'ютері. Ваші файли коду ніколи не завантажуються, не передаються та не обробляються на зовнішніх серверах.","inLanguage":"uk"}},{"@type":"Question","@id":"https://chronos-bot.com/uk#faq-uk-q7","name":"Чи отримаю я майбутні оновлення?","acceptedAnswer":{"@type":"Answer","text":"Так! Власники Стандартної ліцензії отримують усі Стандартні оновлення назавжди. Pro-підписники отримують доступ до всіх Pro-функцій при випуску. Оновлення доставляються автоматично через Microsoft Store.","inLanguage":"uk"}}],"datePublished":"2026-02-01","isPartOf":{"@type":"WebSite","@id":"https://chronos-bot.com/#website","name":"Chronos","url":"https://chronos-bot.com/"},"about":{"@type":"WebApplication","@id":"https://chronos-bot.com/#webapp","name":"Chronos","applicationCategory":"DeveloperApplication","operatingSystem":"Windows, Web"},"author":{"@type":"Organization","name":"Chronos","url":"https://chronos-bot.com/"},"speakable":{"@type":"SpeakableSpecification","cssSelector":["#faq h3[data-faq-question]","#faq [data-faq-answer]","#faq"]}}</script>
    <script type="application/ld+json" data-faq-lang="zh">{"@context":"https://schema.org","@type":"FAQPage","@id":"https://chronos-bot.com/zh#faq-zh","inLanguage":"zh","url":"https://chronos-bot.com/zh","dateModified":"2026-04-23","publisher":{"@type":"Organization","name":"Chronos","url":"https://chronos-bot.com","logo":{"@type":"ImageObject","url":"https://chronos-bot.com/favicon.png"}},"mainEntity":[{"@type":"Question","@id":"https://chronos-bot.com/zh#faq-zh-q1","name":"什么是 Chronos？","acceptedAnswer":{"@type":"Answer","text":"Chronos 是一款 Windows 桌面应用程序，可将整个文件夹结构转换为针对 ChatGPT、Claude 和 Copilot 等 AI 助手优化的文本文件。无需逐个手动复制文件，几秒钟内即可导出整个项目上下文。","inLanguage":"zh"}},{"@type":"Question","@id":"https://chronos-bot.com/zh#faq-zh-q2","name":"如何购买和下载？","acceptedAnswer":{"@type":"Answer","text":"所有购买均通过 Microsoft Store 进行。点击\"从 Microsoft Store 下载\"访问应用页面。付款和许可证管理完全由 Microsoft 处理。","inLanguage":"zh"}},{"@type":"Question","@id":"https://chronos-bot.com/zh#faq-zh-q3","name":"标准版和专业版有什么区别？","acceptedAnswer":{"@type":"Answer","text":"标准许可证（€14.99 一次性）包括：每次最多500个文件的无限提取、终身许可证、Windows 右键菜单、多线程、桌面通知。专业版（€6.99/月或€47.88/年）添加：无文件数量限制、高级扩展名/目录管理、可配置自动拆分、可保存预设和高级模板。","inLanguage":"zh"}},{"@type":"Question","@id":"https://chronos-bot.com/zh#faq-zh-q4","name":"可以退款吗？","acceptedAnswer":{"@type":"Answer","text":"退款根据 Microsoft Store 政策和适用消费者保护法处理。我们不提供直接退款，因为所有交易均通过 Microsoft 进行。","inLanguage":"zh"}},{"@type":"Question","@id":"https://chronos-bot.com/zh#faq-zh-q5","name":"有免费试用吗？","acceptedAnswer":{"@type":"Answer","text":"是的！您可以免费试用 3 次，在购买前体验 Chronos。标准许可证是一次性购买，无需定期付款。","inLanguage":"zh"}},{"@type":"Question","@id":"https://chronos-bot.com/zh#faq-zh-q6","name":"我的数据会离开我的电脑吗？","acceptedAnswer":{"@type":"Answer","text":"不会。Chronos 100% 在本地运行。您的代码文件永远不会上传、传输或在外部服务器上处理。","inLanguage":"zh"}},{"@type":"Question","@id":"https://chronos-bot.com/zh#faq-zh-q7","name":"我会收到未来的更新吗？","acceptedAnswer":{"@type":"Answer","text":"是的！标准许可证持有者永久获得所有标准更新。专业版订阅者在发布时可访问所有专业版功能。更新通过 Microsoft Store 自动提供。","inLanguage":"zh"}}],"datePublished":"2026-02-01","isPartOf":{"@type":"WebSite","@id":"https://chronos-bot.com/#website","name":"Chronos","url":"https://chronos-bot.com/"},"about":{"@type":"WebApplication","@id":"https://chronos-bot.com/#webapp","name":"Chronos","applicationCategory":"DeveloperApplication","operatingSystem":"Windows, Web"},"author":{"@type":"Organization","name":"Chronos","url":"https://chronos-bot.com/"},"speakable":{"@type":"SpeakableSpecification","cssSelector":["#faq h3[data-faq-question]","#faq [data-faq-answer]","#faq"]}}</script>
    <script type="application/ld+json" data-faq-lang="ja">{"@context":"https://schema.org","@type":"FAQPage","@id":"https://chronos-bot.com/ja#faq-ja","inLanguage":"ja","url":"https://chronos-bot.com/ja","dateModified":"2026-04-23","publisher":{"@type":"Organization","name":"Chronos","url":"https://chronos-bot.com","logo":{"@type":"ImageObject","url":"https://chronos-bot.com/favicon.png"}},"mainEntity":[{"@type":"Question","@id":"https://chronos-bot.com/ja#faq-ja-q1","name":"Chronosとは何ですか？","acceptedAnswer":{"@type":"Answer","text":"ChronosはWindowsデスクトップアプリケーションで、フォルダ構造全体をChatGPT、Claude、CopilotなどのAIアシスタント向けに最適化されたテキストファイルに変換します。ファイルを一つずつ手動でコピーする代わりに、プロジェクト全体のコンテキストを数秒でエクスポートできます。","inLanguage":"ja"}},{"@type":"Question","@id":"https://chronos-bot.com/ja#faq-ja-q2","name":"購入とダウンロードの方法は？","acceptedAnswer":{"@type":"Answer","text":"すべての購入はMicrosoft Storeを通じて行われます。「Microsoft Storeからダウンロード」をクリックしてアプリページにアクセス。支払いとライセンス管理は完全にMicrosoftが担当します。","inLanguage":"ja"}},{"@type":"Question","@id":"https://chronos-bot.com/ja#faq-ja-q3","name":"スタンダードとProの違いは何ですか？","acceptedAnswer":{"@type":"Answer","text":"スタンダードライセンス（€14.99一度きり）には：1回最大500ファイルの無制限抽出、永久ライセンス、Windows右クリックメニュー、マルチスレッド、デスクトップ通知が含まれます。Pro（€6.99/月または€47.88/年）には：1回あたりのファイル数制限なし、高度な拡張子/ディレクトリ管理、設定可能な自動分割、保存可能なプリセット、高度なテンプレートが追加されます。","inLanguage":"ja"}},{"@type":"Question","@id":"https://chronos-bot.com/ja#faq-ja-q4","name":"返金はできますか？","acceptedAnswer":{"@type":"Answer","text":"返金はMicrosoft Storeのポリシーと適用される消費者保護法に従って処理されます。すべての取引がMicrosoft経由で行われるため、直接返金は行いません。","inLanguage":"ja"}},{"@type":"Question","@id":"https://chronos-bot.com/ja#faq-ja-q5","name":"無料トライアルはありますか？","acceptedAnswer":{"@type":"Answer","text":"はい！購入前にChronosを試せる3回の無料トライアルがあります。スタンダードライセンスは定期的な費用なしの一度きりの購入です。","inLanguage":"ja"}},{"@type":"Question","@id":"https://chronos-bot.com/ja#faq-ja-q6","name":"データがコンピュータを離れますか？","acceptedAnswer":{"@type":"Answer","text":"いいえ。Chronosはコンピュータで100%ローカルに動作します。コードファイルは外部サーバーにアップロード、送信、処理されることはありません。","inLanguage":"ja"}},{"@type":"Question","@id":"https://chronos-bot.com/ja#faq-ja-q7","name":"将来のアップデートは受け取れますか？","acceptedAnswer":{"@type":"Answer","text":"はい！スタンダードライセンス保有者は永久にすべてのスタンダードアップデートを受け取ります。Proサブスクライバーはリリース時にすべてのPro機能にアクセスできます。アップデートはMicrosoft Storeを通じて自動的に提供されます。","inLanguage":"ja"}}],"datePublished":"2026-02-01","isPartOf":{"@type":"WebSite","@id":"https://chronos-bot.com/#website","name":"Chronos","url":"https://chronos-bot.com/"},"about":{"@type":"WebApplication","@id":"https://chronos-bot.com/#webapp","name":"Chronos","applicationCategory":"DeveloperApplication","operatingSystem":"Windows, Web"},"author":{"@type":"Organization","name":"Chronos","url":"https://chronos-bot.com/"},"speakable":{"@type":"SpeakableSpecification","cssSelector":["#faq h3[data-faq-question]","#faq [data-faq-answer]","#faq"]}}</script>
    <script type="application/ld+json" data-faq-lang="ko">{"@context":"https://schema.org","@type":"FAQPage","@id":"https://chronos-bot.com/ko#faq-ko","inLanguage":"ko","url":"https://chronos-bot.com/ko","dateModified":"2026-04-23","publisher":{"@type":"Organization","name":"Chronos","url":"https://chronos-bot.com","logo":{"@type":"ImageObject","url":"https://chronos-bot.com/favicon.png"}},"mainEntity":[{"@type":"Question","@id":"https://chronos-bot.com/ko#faq-ko-q1","name":"Chronos란 무엇인가요?","acceptedAnswer":{"@type":"Answer","text":"Chronos는 전체 폴더 구조를 ChatGPT, Claude, Copilot과 같은 AI 어시스턴트에 최적화된 텍스트 파일로 변환하는 Windows 데스크톱 애플리케이션입니다. 파일을 하나씩 수동으로 복사하는 대신, 몇 초 만에 전체 프로젝트 컨텍스트를 내보낼 수 있습니다.","inLanguage":"ko"}},{"@type":"Question","@id":"https://chronos-bot.com/ko#faq-ko-q2","name":"구매하고 다운로드하는 방법은?","acceptedAnswer":{"@type":"Answer","text":"모든 구매는 Microsoft Store를 통해 이루어집니다. \"Microsoft Store에서 다운로드\"를 클릭하여 앱 페이지를 방문하세요. 결제 및 라이선스 관리는 Microsoft에서 완전히 처리합니다.","inLanguage":"ko"}},{"@type":"Question","@id":"https://chronos-bot.com/ko#faq-ko-q3","name":"스탠다드와 Pro의 차이는 무엇인가요?","acceptedAnswer":{"@type":"Answer","text":"스탠다드 라이선스 (€14.99 일회성)에는: 추출당 최대 500개 파일 무제한 추출, 평생 라이선스, Windows 우클릭 메뉴, 멀티스레드, 데스크톱 알림이 포함됩니다. Pro (€6.99/월 또는 €47.88/년)에는: 추출당 파일 수 제한 없음, 고급 확장자/디렉토리 관리, 설정 가능한 자동 분할, 저장 가능한 프리셋, 고급 템플릿이 추가됩니다.","inLanguage":"ko"}},{"@type":"Question","@id":"https://chronos-bot.com/ko#faq-ko-q4","name":"환불을 받을 수 있나요?","acceptedAnswer":{"@type":"Answer","text":"환불은 Microsoft Store 정책과 적용 소비자 보호법에 따라 처리됩니다. 모든 거래가 Microsoft를 통해 이루어지므로 직접 환불을 제공하지 않습니다.","inLanguage":"ko"}},{"@type":"Question","@id":"https://chronos-bot.com/ko#faq-ko-q5","name":"무료 체험판이 있나요?","acceptedAnswer":{"@type":"Answer","text":"네! 구매 전 Chronos를 체험할 수 있는 3번의 무료 체험이 있습니다. 스탠다드 라이선스는 반복 비용 없는 일회성 구매입니다.","inLanguage":"ko"}},{"@type":"Question","@id":"https://chronos-bot.com/ko#faq-ko-q6","name":"내 데이터가 컴퓨터를 떠나나요?","acceptedAnswer":{"@type":"Answer","text":"아니요. Chronos는 컴퓨터에서 100% 로컬로 실행됩니다. 코드 파일은 외부 서버에 업로드, 전송 또는 처리되지 않습니다.","inLanguage":"ko"}},{"@type":"Question","@id":"https://chronos-bot.com/ko#faq-ko-q7","name":"향후 업데이트를 받을 수 있나요?","acceptedAnswer":{"@type":"Answer","text":"네! 스탠다드 라이선스 보유자는 모든 스탠다드 업데이트를 영구적으로 받습니다. Pro 구독자는 출시 시 모든 Pro 기능에 접근할 수 있습니다. 업데이트는 Microsoft Store를 통해 자동으로 제공됩니다.","inLanguage":"ko"}}],"datePublished":"2026-02-01","isPartOf":{"@type":"WebSite","@id":"https://chronos-bot.com/#website","name":"Chronos","url":"https://chronos-bot.com/"},"about":{"@type":"WebApplication","@id":"https://chronos-bot.com/#webapp","name":"Chronos","applicationCategory":"DeveloperApplication","operatingSystem":"Windows, Web"},"author":{"@type":"Organization","name":"Chronos","url":"https://chronos-bot.com/"},"speakable":{"@type":"SpeakableSpecification","cssSelector":["#faq h3[data-faq-question]","#faq [data-faq-answer]","#faq"]}}</script>
    <script type="application/ld+json" data-faq-lang="hi">{"@context":"https://schema.org","@type":"FAQPage","@id":"https://chronos-bot.com/hi#faq-hi","inLanguage":"hi","url":"https://chronos-bot.com/hi","dateModified":"2026-04-23","publisher":{"@type":"Organization","name":"Chronos","url":"https://chronos-bot.com","logo":{"@type":"ImageObject","url":"https://chronos-bot.com/favicon.png"}},"mainEntity":[{"@type":"Question","@id":"https://chronos-bot.com/hi#faq-hi-q1","name":"Chronos क्या है?","acceptedAnswer":{"@type":"Answer","text":"Chronos एक Windows डेस्कटॉप एप्लिकेशन है जो पूरी फ़ोल्डर संरचनाओं को ChatGPT, Claude और Copilot जैसे AI सहायकों के लिए अनुकूलित टेक्स्ट फ़ाइलों में बदलता है।","inLanguage":"hi"}},{"@type":"Question","@id":"https://chronos-bot.com/hi#faq-hi-q2","name":"खरीदने और डाउनलोड करने का तरीका?","acceptedAnswer":{"@type":"Answer","text":"सभी खरीद Microsoft Store के माध्यम से की जाती हैं। \"Microsoft Store से डाउनलोड करें\" पर क्लिक करें। भुगतान और लाइसेंस प्रबंधन पूरी तरह Microsoft द्वारा किया जाता है।","inLanguage":"hi"}},{"@type":"Question","@id":"https://chronos-bot.com/hi#faq-hi-q3","name":"स्टैंडर्ड और Pro के बीच क्या अंतर है?","acceptedAnswer":{"@type":"Answer","text":"स्टैंडर्ड लाइसेंस (€14.99 एकमुश्त) में शामिल हैं: 500 फ़ाइलों तक असीमित एक्सट्रैक्शन, आजीवन लाइसेंस, Windows राइट-क्लिक मेनू, मल्टी-थ्रेड, डेस्कटॉप सूचनाएं। Pro (€6.99/माह या €47.88/वर्ष) जोड़ता है: कोई फ़ाइल सीमा नहीं, उन्नत प्रबंधन, ऑटो-स्प्लिट, प्रीसेट और टेम्पलेट।","inLanguage":"hi"}},{"@type":"Question","@id":"https://chronos-bot.com/hi#faq-hi-q4","name":"क्या मुझे रिफंड मिल सकता है?","acceptedAnswer":{"@type":"Answer","text":"रिफंड Microsoft Store नीतियों के अनुसार संभाला जाता है। हम सीधे रिफंड प्रदान नहीं करते क्योंकि सभी लेनदेन Microsoft के माध्यम से जाते हैं।","inLanguage":"hi"}},{"@type":"Question","@id":"https://chronos-bot.com/hi#faq-hi-q5","name":"क्या मुफ़्त ट्रायल है?","acceptedAnswer":{"@type":"Answer","text":"हां! खरीदने से पहले Chronos आज़माने के लिए 3 मुफ़्त ट्रायल हैं। स्टैंडर्ड लाइसेंस एकमुश्त खरीद है।","inLanguage":"hi"}},{"@type":"Question","@id":"https://chronos-bot.com/hi#faq-hi-q6","name":"क्या मेरा डेटा मेरे कंप्यूटर को छोड़ता है?","acceptedAnswer":{"@type":"Answer","text":"नहीं। Chronos आपके कंप्यूटर पर 100% स्थानीय रूप से चलता है। आपकी कोड फ़ाइलें कभी भी अपलोड, ट्रांसमिट या बाहरी सर्वर पर प्रोसेस नहीं की जाती हैं।","inLanguage":"hi"}},{"@type":"Question","@id":"https://chronos-bot.com/hi#faq-hi-q7","name":"क्या मुझे भविष्य के अपडेट मिलेंगे?","acceptedAnswer":{"@type":"Answer","text":"हां! स्टैंडर्ड लाइसेंस धारकों को हमेशा के लिए सभी स्टैंडर्ड अपडेट मिलते हैं। Pro सब्सक्राइबर को लॉन्च पर सभी Pro सुविधाओं तक पहुंच मिलती है।","inLanguage":"hi"}}],"datePublished":"2026-02-01","isPartOf":{"@type":"WebSite","@id":"https://chronos-bot.com/#website","name":"Chronos","url":"https://chronos-bot.com/"},"about":{"@type":"WebApplication","@id":"https://chronos-bot.com/#webapp","name":"Chronos","applicationCategory":"DeveloperApplication","operatingSystem":"Windows, Web"},"author":{"@type":"Organization","name":"Chronos","url":"https://chronos-bot.com/"},"speakable":{"@type":"SpeakableSpecification","cssSelector":["#faq h3[data-faq-question]","#faq [data-faq-answer]","#faq"]}}</script>
    <script type="application/ld+json" data-faq-lang="th">{"@context":"https://schema.org","@type":"FAQPage","@id":"https://chronos-bot.com/th#faq-th","inLanguage":"th","url":"https://chronos-bot.com/th","dateModified":"2026-04-23","publisher":{"@type":"Organization","name":"Chronos","url":"https://chronos-bot.com","logo":{"@type":"ImageObject","url":"https://chronos-bot.com/favicon.png"}},"mainEntity":[{"@type":"Question","@id":"https://chronos-bot.com/th#faq-th-q1","name":"Chronos คืออะไร?","acceptedAnswer":{"@type":"Answer","text":"Chronos เป็นแอปพลิเคชันเดสก์ท็อป Windows ที่แปลงโครงสร้างโฟลเดอร์ทั้งหมดเป็นไฟล์ข้อความที่เหมาะสำหรับผู้ช่วย AI เช่น ChatGPT, Claude และ Copilot","inLanguage":"th"}},{"@type":"Question","@id":"https://chronos-bot.com/th#faq-th-q2","name":"วิธีซื้อและดาวน์โหลด?","acceptedAnswer":{"@type":"Answer","text":"การซื้อทั้งหมดผ่าน Microsoft Store คลิก \"ดาวน์โหลดจาก Microsoft Store\" การชำระเงินและการจัดการใบอนุญาตจัดการโดย Microsoft ทั้งหมด","inLanguage":"th"}},{"@type":"Question","@id":"https://chronos-bot.com/th#faq-th-q3","name":"ความแตกต่างระหว่างมาตรฐานและ Pro คืออะไร?","acceptedAnswer":{"@type":"Answer","text":"ใบอนุญาตมาตรฐาน (€14.99 ครั้งเดียว): การแยกไม่จำกัดสูงสุด 500 ไฟล์ ใบอนุญาตตลอดชีวิต เมนูคลิกขวา มัลติเธรด การแจ้งเตือน Pro (€6.99/เดือน หรือ €47.88/ปี) เพิ่ม: ไม่มีขีดจำกัดไฟล์ การจัดการขั้นสูง การแยกอัตโนมัติ พรีเซ็ต และเทมเพลต","inLanguage":"th"}},{"@type":"Question","@id":"https://chronos-bot.com/th#faq-th-q4","name":"ขอคืนเงินได้ไหม?","acceptedAnswer":{"@type":"Answer","text":"การคืนเงินจัดการตามนโยบาย Microsoft Store เราไม่ให้การคืนเงินโดยตรง","inLanguage":"th"}},{"@type":"Question","@id":"https://chronos-bot.com/th#faq-th-q5","name":"มีการทดลองฟรีไหม?","acceptedAnswer":{"@type":"Answer","text":"ใช่! คุณได้รับ 3 ครั้งทดลองฟรีก่อนซื้อ ใบอนุญาตมาตรฐานเป็นการซื้อครั้งเดียวไม่มีค่าใช้จ่ายประจำ","inLanguage":"th"}},{"@type":"Question","@id":"https://chronos-bot.com/th#faq-th-q6","name":"ข้อมูลของฉันออกจากคอมพิวเตอร์ไหม?","acceptedAnswer":{"@type":"Answer","text":"ไม่ Chronos รันในเครื่อง 100% ไฟล์โค้ดของคุณไม่เคยอัปโหลด ส่ง หรือประมวลผลบนเซิร์ฟเวอร์ภายนอก","inLanguage":"th"}},{"@type":"Question","@id":"https://chronos-bot.com/th#faq-th-q7","name":"ฉันจะได้รับการอัปเดตในอนาคตไหม?","acceptedAnswer":{"@type":"Answer","text":"ใช่! ผู้ถือใบอนุญาตมาตรฐานได้รับการอัปเดตทั้งหมดตลอดไป ผู้สมัคร Pro เข้าถึงฟีเจอร์ Pro ทั้งหมดเมื่อเปิดตัว","inLanguage":"th"}}],"datePublished":"2026-02-01","isPartOf":{"@type":"WebSite","@id":"https://chronos-bot.com/#website","name":"Chronos","url":"https://chronos-bot.com/"},"about":{"@type":"WebApplication","@id":"https://chronos-bot.com/#webapp","name":"Chronos","applicationCategory":"DeveloperApplication","operatingSystem":"Windows, Web"},"author":{"@type":"Organization","name":"Chronos","url":"https://chronos-bot.com/"},"speakable":{"@type":"SpeakableSpecification","cssSelector":["#faq h3[data-faq-question]","#faq [data-faq-answer]","#faq"]}}</script>
    <script type="application/ld+json" data-faq-lang="vi">{"@context":"https://schema.org","@type":"FAQPage","@id":"https://chronos-bot.com/vi#faq-vi","inLanguage":"vi","url":"https://chronos-bot.com/vi","dateModified":"2026-04-23","publisher":{"@type":"Organization","name":"Chronos","url":"https://chronos-bot.com","logo":{"@type":"ImageObject","url":"https://chronos-bot.com/favicon.png"}},"mainEntity":[{"@type":"Question","@id":"https://chronos-bot.com/vi#faq-vi-q1","name":"Chronos là gì?","acceptedAnswer":{"@type":"Answer","text":"Chronos là ứng dụng máy tính Windows chuyển đổi toàn bộ cấu trúc thư mục thành tệp văn bản tối ưu cho các trợ lý AI như ChatGPT, Claude và Copilot.","inLanguage":"vi"}},{"@type":"Question","@id":"https://chronos-bot.com/vi#faq-vi-q2","name":"Cách mua và tải xuống?","acceptedAnswer":{"@type":"Answer","text":"Tất cả mua hàng qua Microsoft Store. Nhấp \"Tải từ Microsoft Store\". Thanh toán và quản lý giấy phép do Microsoft xử lý hoàn toàn.","inLanguage":"vi"}},{"@type":"Question","@id":"https://chronos-bot.com/vi#faq-vi-q3","name":"Sự khác biệt giữa Standard và Pro?","acceptedAnswer":{"@type":"Answer","text":"Standard (€14.99 một lần): trích xuất không giới hạn tối đa 500 file, giấy phép trọn đời, menu chuột phải, đa luồng, thông báo. Pro (€6.99/tháng hoặc €47.88/năm) thêm: không giới hạn file, quản lý nâng cao, phân chia tự động, preset và template.","inLanguage":"vi"}},{"@type":"Question","@id":"https://chronos-bot.com/vi#faq-vi-q4","name":"Tôi có thể hoàn tiền không?","acceptedAnswer":{"@type":"Answer","text":"Hoàn tiền được xử lý theo chính sách Microsoft Store. Chúng tôi không hoàn tiền trực tiếp.","inLanguage":"vi"}},{"@type":"Question","@id":"https://chronos-bot.com/vi#faq-vi-q5","name":"Có dùng thử miễn phí không?","acceptedAnswer":{"@type":"Answer","text":"Có! Bạn có 3 lần dùng thử miễn phí trước khi mua. Standard là mua một lần không có phí định kỳ.","inLanguage":"vi"}},{"@type":"Question","@id":"https://chronos-bot.com/vi#faq-vi-q6","name":"Dữ liệu của tôi có rời máy tính không?","acceptedAnswer":{"@type":"Answer","text":"Không. Chronos chạy 100% cục bộ. File code không bao giờ được tải lên hoặc xử lý trên máy chủ bên ngoài.","inLanguage":"vi"}},{"@type":"Question","@id":"https://chronos-bot.com/vi#faq-vi-q7","name":"Tôi có nhận được cập nhật trong tương lai không?","acceptedAnswer":{"@type":"Answer","text":"Có! Người dùng Standard nhận tất cả cập nhật mãi mãi. Người đăng ký Pro có quyền truy cập vào tất cả tính năng Pro khi ra mắt.","inLanguage":"vi"}}],"datePublished":"2026-02-01","isPartOf":{"@type":"WebSite","@id":"https://chronos-bot.com/#website","name":"Chronos","url":"https://chronos-bot.com/"},"about":{"@type":"WebApplication","@id":"https://chronos-bot.com/#webapp","name":"Chronos","applicationCategory":"DeveloperApplication","operatingSystem":"Windows, Web"},"author":{"@type":"Organization","name":"Chronos","url":"https://chronos-bot.com/"},"speakable":{"@type":"SpeakableSpecification","cssSelector":["#faq h3[data-faq-question]","#faq [data-faq-answer]","#faq"]}}</script>
    <script type="application/ld+json" data-faq-lang="id">{"@context":"https://schema.org","@type":"FAQPage","@id":"https://chronos-bot.com/id#faq-id","inLanguage":"id","url":"https://chronos-bot.com/id","dateModified":"2026-04-23","publisher":{"@type":"Organization","name":"Chronos","url":"https://chronos-bot.com","logo":{"@type":"ImageObject","url":"https://chronos-bot.com/favicon.png"}},"mainEntity":[{"@type":"Question","@id":"https://chronos-bot.com/id#faq-id-q1","name":"Apa itu Chronos?","acceptedAnswer":{"@type":"Answer","text":"Chronos adalah aplikasi desktop Windows yang mengkonversi seluruh struktur folder menjadi file teks yang dioptimalkan untuk asisten AI seperti ChatGPT, Claude, dan Copilot.","inLanguage":"id"}},{"@type":"Question","@id":"https://chronos-bot.com/id#faq-id-q2","name":"Bagaimana cara membeli dan mengunduh?","acceptedAnswer":{"@type":"Answer","text":"Semua pembelian dilakukan melalui Microsoft Store. Klik \"Unduh dari Microsoft Store\". Pembayaran dan manajemen lisensi ditangani sepenuhnya oleh Microsoft.","inLanguage":"id"}},{"@type":"Question","@id":"https://chronos-bot.com/id#faq-id-q3","name":"Apa perbedaan Standard dan Pro?","acceptedAnswer":{"@type":"Answer","text":"Lisensi Standard (€14,99 sekali bayar): ekstraksi tidak terbatas hingga 500 file, lisensi seumur hidup, menu klik kanan Windows, multi-thread, notifikasi. Pro (€6,99/bulan atau €47,88/tahun) menambahkan: tidak ada batas file, manajemen lanjutan, auto-split, preset, dan template.","inLanguage":"id"}},{"@type":"Question","@id":"https://chronos-bot.com/id#faq-id-q4","name":"Bisakah saya mendapatkan pengembalian dana?","acceptedAnswer":{"@type":"Answer","text":"Pengembalian dana diproses sesuai kebijakan Microsoft Store. Kami tidak memberikan pengembalian dana langsung.","inLanguage":"id"}},{"@type":"Question","@id":"https://chronos-bot.com/id#faq-id-q5","name":"Apakah ada uji coba gratis?","acceptedAnswer":{"@type":"Answer","text":"Ya! Anda mendapatkan 3 percobaan gratis untuk mencoba Chronos sebelum membeli.","inLanguage":"id"}},{"@type":"Question","@id":"https://chronos-bot.com/id#faq-id-q6","name":"Apakah data saya meninggalkan komputer?","acceptedAnswer":{"@type":"Answer","text":"Tidak. Chronos berjalan 100% secara lokal. File kode Anda tidak pernah diunggah atau diproses di server eksternal.","inLanguage":"id"}},{"@type":"Question","@id":"https://chronos-bot.com/id#faq-id-q7","name":"Apakah saya akan menerima pembaruan di masa depan?","acceptedAnswer":{"@type":"Answer","text":"Ya! Pemegang lisensi Standard menerima semua pembaruan Standard selamanya. Pelanggan Pro mendapatkan akses ke semua fitur Pro saat diluncurkan.","inLanguage":"id"}}],"datePublished":"2026-02-01","isPartOf":{"@type":"WebSite","@id":"https://chronos-bot.com/#website","name":"Chronos","url":"https://chronos-bot.com/"},"about":{"@type":"WebApplication","@id":"https://chronos-bot.com/#webapp","name":"Chronos","applicationCategory":"DeveloperApplication","operatingSystem":"Windows, Web"},"author":{"@type":"Organization","name":"Chronos","url":"https://chronos-bot.com/"},"speakable":{"@type":"SpeakableSpecification","cssSelector":["#faq h3[data-faq-question]","#faq [data-faq-answer]","#faq"]}}</script>
